- id: mh-009
  category: multi-hop
  question: How did the two leading assassins of Caesar die?
  ideal_answer: >-
    Both died at Philippi. Cassius, mistakenly believing the battle lost,
    bared his neck to his freedman Pindarus and was beheaded; in the second
    battle Brutus, defeated, fell on his sword — held, by some accounts, by
    his friend Strato — and died.
  gold_spans:
