      groups: [hop1]
      quote: >-
        pulling up his mantle over his head, he made his neck bare, and held
        it forth to Pindarus, commanding him to strike. The head was certainly
        found lying severed from the body.
      note: "Hop 1: Cassius' death (Plutarch, Brutus)"
    - pg_id: 900004
      groups: [hop1]
      quote: Then, as he presented his throat, Pindarus slew him.
      note: "Hop 1 alternate: Appian, Civil Wars IV (new source)"
