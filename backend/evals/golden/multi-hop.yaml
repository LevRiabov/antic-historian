        death.
      note: "Hop 2 alternate: Bury (new source)"
  status: draft

- id: mh-006
  category: multi-hop
  question: How did Alexander react on finding the tomb of the founder of the Persian empire desecrated?
  ideal_answer: >-
    Finding the tomb of Cyrus (whose epitaph read "I am Cyrus, son of
    Cambyses, who founded the empire of the Persians") dug through and
    pillaged at Pasargadae, Alexander was grieved; he commissioned Aristobulus
    to restore the tomb and its furnishings, seal the entrance, and he had the
    Magian guards arrested and tortured to find the culprits.
  gold_spans:
    - pg_id: 46976
      groups: [hop1]
      quote: >-
        Upon the tomb an inscription in Persian letters had been placed, which
        bore the following meaning in the Persian language: “O man, I am
        Cyrus, son of Cambyses, who founded the empire of the Persians, and
        was king of Asia. Do not therefore grudge me this monument.”
      note: "Hop 1: Cyrus = founder (Arrian VI.29, the epitaph)"
    - pg_id: 46976
      groups: [hop2]
      quote: >-
        He was grieved by the outrage committed upon the tomb of Cyrus, son of
        Cambyses; for according to Aristobulus, he found it dug through and
        pillaged.
      note: "Hop 2: the grief (Arrian VI.29, separate chunk)"
    - pg_id: 46976
      groups: [hop2]
      quote: >-
        Aristobulus says that he was himself commissioned by Alexander to
        restore the tomb for Cyrus, to put in the coffin the parts of the body
        still preserved, to put the lid on, and to restore the parts of the
        coffin which had been defaced.
      note: "Hop 2 continued: the restoration order"
    - pg_id: 44886
      groups: [hop1]
      quote: I ESTABLISHED THE PERSIAN EMPIRE AND WAS KING OF ASIA.
      note: "Hop 1 alternate: Strabo, Geography XV.3 (the epitaph, Aristobulus's version)"
    - pg_id: 44886
      groups: [hop2]
      quote: >-
        Aristobulus says, he entered through this opening, by order of
        Alexander, and decorated the tomb.
      note: "Hop 2 alternate: Strabo (Aristobulus restores the tomb by Alexander's order)"
    - pg_id: 674
      groups: [hop1, hop2]
      quote: >-
        The reading of this sensibly touched Alexander, filling him with the
        thought of the uncertainty and mutability of human affairs.
      note: "Hops 1+2: Plutarch, Alexander (same chunk holds the 'founder' epitaph and Alexander's reaction + execution of Polymachus)"
    - pg_id: 60786
      groups: [hop1, hop2]
      quote: >-
        Visiting the tomb of Cyrus the Great, founder of the Persian empire,
        he was incensed to find it violated and pillaged.
      note: "Hops 1+2: Grote vol. XII (founder + the reaction in one passage)"
  notes: >-
    All hops within Arrian's long tomb chapter, but spread across multiple
