- id: mh-003
  category: multi-hop
  question: Who tutored the son of the king who crushed the Greeks at Chaeronea?
  ideal_answer: >-
    Aristotle. The king is Philip of Macedon, victor at Chaeronea (where his
    son Alexander led the charge against the Theban Sacred Band); Philip had
    earlier sent for Aristotle, the most celebrated philosopher of the age, to
    instruct Alexander, rewarding him by rebuilding his native Stagira.
  gold_spans:
    - pg_id: 674
      groups: [hop1]
      quote: >-
        At the battle of Chaeronea, which his father fought against the
        Grecians, he is said to have been the first man that charged the
        Thebans' sacred band.
      note: "Hop 1: Philip–Chaeronea–son link (Plutarch, Alexander)"
    - pg_id: 61469
      groups: [hop1]
      quote: >-
        In the field of battle near Chæroneia, Philip himself commanded a
        chosen body of troops on the wing opposed to the Athenians, while his
        youthful son, Alexander, aided by experienced officers, commanded
        against the Thebans on the other wing.
      note: "Hop 1 alternate: Grote vol. XI"
    - pg_id: 46976
      groups: [hop1]
      quote: At the age of 18 by his skill and courage he greatly assisted Philip in gaining the battle of Chaeronea.
      note: "Hop 1 alternate: Arrian, translator's note (Alexander aided Philip at Chaeronea)"
    - pg_id: 674
      groups: [hop2]
      quote: >-
