  question: Which Spartan commanded the Greeks at the land battle fought the same day as the sea battle at Mycale?
  ideal_answer: >-
    Pausanias, son of Cleombrotos (regent for Leonidas' young son
    Pleistarchos). Herodotus reports that the victory at Plataea and the
    fight at Mycale fell on the same day, and that Pausanias was appointed to
    lead the Spartan army that won at Plataea.
  gold_spans:
