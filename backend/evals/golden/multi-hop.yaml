- id: mh-011
  category: multi-hop
  question: How did the brother of Hannibal who marched an army into Italy to reinforce him meet his end?
  ideal_answer: >-
    Hasdrubal, Hannibal's brother, crossed the Alps into Italy to reinforce him
    but was defeated and killed by the consuls Marcus Livius and Claudius Nero at
    the river Metaurus (207 BC); his severed head, carried south, was thrown
    before the outposts of Hannibal's camp.
  gold_spans:
    - pg_id: 12582
      groups: [hop1]
      quote: >-
        Hasdrubal had quitted his winter quarters, and was now crossing the Alps
      note: "Hop 1: Hasdrubal crosses the Alps to reinforce Hannibal (Livy XXVII)"
    - pg_id: 12582
      groups: [hop2]
      quote: >-
        ordered the head of Hasdrubal, which he had carefully kept and brought
        with him, to be thrown before the advanced guards of the enemy
      note: "Hop 2: his head thrown into Hannibal's camp after the Metaurus (Livy XXVII)"
    - pg_id: 12582
      groups: [hop1, hop2]
      quote: >-
        Hasdrubal, who had crossed the Alps with a reinforcement for Hannibal,
        defeated by the consuls, Marcus Livius and Claudius Nero, and slain
      note: "Hops 1+2: Livy's Book XXVII argument-summary states both the crossing and the death"
  notes: >-
