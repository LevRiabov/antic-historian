- id: mh-008
  category: multi-hop
  question: How did the statesman who championed Athens' Long Walls die?
  ideal_answer: >-
    Pericles — who, as Socrates attested, proposed the long wall to the
    people — died of the plague of Athens, in his case not with violent fits
    but as a dull, lingering distemper that slowly wasted his body and mind.
  gold_spans:
