      note: "Hop 1: Nero last of the dynasty (Dio LXIII)"
    - pg_id: 10890
      groups: [hop1]
      quote: For Nero was indeed the last emperor of the Julian line descended from Aeneas.
      note: "Hop 1 alternate: Cassius Dio, Rome vol. 5 (the Sibylline-oracle passage, distinct chunk)"
