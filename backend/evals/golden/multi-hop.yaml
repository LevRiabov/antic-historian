# Golden set — MULTI-HOP: answering requires combining facts from DIFFERENT
# passages (possibly same work): "Who commanded the fleet at the battle where
# X died?" needs passage A (where X died) + passage B (who commanded there).
# Spec: docs/golden-set.md
#
# Each hop is a separate requirement (`groups: [hop1]` / `[hop2]`); within a hop
# the spans are alternatives (any one covers that hop). A single passage that
# answers both hops lists both labels ([hop1, hop2]). Recall is per requirement
# group, so retrieving one alternative per hop scores 1.0 (see §4a).

- id: mh-001
  category: multi-hop
  question: What city did Alexander found in memory of the horse he had tamed as a boy?
  ideal_answer: >-
    Bucephala, on the Hydaspes. As a boy Alexander tamed the horse Bucephalas
    (turning him toward the sun after noticing he feared his own shadow); when
    the horse died of age and toil after the battle with Porus, Alexander
    founded the city of Bucephala in his memory.
  gold_spans:
    - pg_id: 674
      groups: [hop1]
      quote: >-
        he immediately ran to the horse, and taking hold of the bridle, turned
        him directly towards the sun, having, it seems, observed that he was
        disturbed at and afraid of the motion of his own shadow; then letting
        him go forward a little, still keeping the reins in his hand, and
        stroking him gently when he found him begin to grow eager and fiery,
        he let fall his upper garment softly, and with one nimble leap
        securely mounted him
      note: "Hop 1: the taming (Plutarch, Alexander)"
    - pg_id: 46976
      groups: [hop2]
      quote: >-
        Alexander founded two cities, one where the battle took place, and the
        other on the spot whence he started to cross the river Hydaspes; the
        former he named Nicaea,[694] after his victory over the Indians, and
        the latter Bucephala in memory of his horse Bucephalas, which died
        there, not from having been wounded by any one, but from the effects
        of toil and old age
      note: "Hop 2: the founding (Arrian V.19; [694] is a footnote marker)"
    - pg_id: 674
      groups: [hop2]
      quote: >-
        built a city, which he named Bucephalia, in memory of him, on the
        bank of the river Hydaspes.
      note: "Hop 2 alternate: Plutarch's own founding passage (same Life, distant from hop 1)"
    - pg_id: 44886
      groups: [hop2]
      quote: One of these cities he called Bucephalia
      note: "Hop 2 alternate: Strabo, Geography XV.1 (city named for the horse killed at the Porus battle)"
    - pg_id: 60786
      groups: [hop2]
      quote: >-
        so named in commemoration of his favorite horse, who died here of age
        and fatigue.
      note: "Hop 2 alternate: Grote vol. XII"
    - pg_id: 900006
      groups: [hop2]
      quote: the city of Bucephala, named after Alexander’s steed, which died here
      note: "Hop 2 alternate: Bury (new source)"
  status: draft

- id: mh-002
  category: multi-hop
  question: How did the wife of the emperor who added Britain to the empire meet her end?
  ideal_answer: >-
    The emperor is Claudius, who invaded Britain to gain a triumph; his wife
    Messalina, after publicly marrying her lover Silius, was ordered to answer
    for her conduct, failed in her attempts at suicide in the gardens of
    Lucullus, and was run through with a sword by a tribune.
  gold_spans:
    - pg_id: 6400
      groups: [hop1]
      quote: >-
        Claudius, at the time of his accession, was fifty years of age; and
        though he had hitherto lived apparently unambitious of public honours,
        accompanied with great ostentation, yet he was now seized with a
        desire to enjoy a triumph. As there existed no war, in which he might
        perform some military achievement, his vanity could only be gratified
        by invading a foreign country, where, contrary to the advice contained
        in the testament of Augustus, he might attempt to extend still further
        the limits of the empire. Either Britain, therefore, or some nation on
        the continent, at a great distance from the capital, became the object
        of such an enterprize; and the former was chosen
      note: "Hop 1: Claudius conquers Britain (Suetonius, Claudius disquisition)"
    - pg_id: 6400
      groups: [hop1]
      quote: he selected Britain, which had never been attempted by any one since Julius Caesar
      note: "Hop 1 alternate: Suetonius, Claudius XVII (the Life proper — Britain chosen for a real triumph)"
    - pg_id: 10883
      groups: [hop1]
      quote: >-
        The senate on learning of his achievement gave him the title of
        Britannicus and allowed him to celebrate a triumph.
      note: "Hop 1 alternate: Cassius Dio, Rome vol. 4 (conquest + triumph)"
    - pg_id: 19694
      groups: [hop1]
      quote: >-
        In A.D. 43 a Roman army invaded Britain. Claudius himself entered that
        country soon after, and returned to Rome to triumph.
      note: "Hop 1 alternate: William Smith, A Smaller History of Rome"
    - pg_id: 6400
      groups: [hop2]
      quote: >-
        Again she made an effort, but again her resolution abandoned her; when
        a tribune burst into the gardens, and plunging his sword into her
        body, she instantly expired.
      note: "Hop 2: Messalina's death (same work, distant passage)"
    - pg_id: 900001
      groups: [hop2]
      quote: a blow from the tribune drove it through her.
      note: "Hop 2 alternate: Tacitus, Annals XI (new source — the famous account)"
    - pg_id: 10883
      groups: [hop2]
      quote: he put to death Mnester with many others and then slew Messalina
      note: "Hop 2 alternate: Cassius Dio, Rome vol. 4 (Dio puts it in the gardens of Asiaticus)"
    - pg_id: 34122
      groups: [hop2]
      quote: >-
        had the imperial harlot ruthlessly struck down as she lay grovelling
