- id: mh-004
  category: multi-hop
  question: Who avenged the Roman commander killed at Carrhae?
  ideal_answer: >-
    Ventidius (Publius Ventidius Bassus), Antony's lieutenant. The commander
    killed at Carrhae was Crassus, slain at a treacherous parley after the
    defeat by the Parthians; Ventidius later defeated the Parthians in three
    battles, killing prince Pacorus, a victory Plutarch says "fully avenged"
    the defeats under Crassus.
  gold_spans:
    - pg_id: 674
      groups: [hop1]
      quote: >-
        Crassus was killed by a Parthian, called Pomaxathres; others say, by a
        different man, and that Pomaxathres only cut off his head and right
        hand after he had fallen.
      note: "Hop 1: Crassus' death (Plutarch, Crassus)"
    - pg_id: 11607
      groups: [hop1]
      quote: >-
        Crassus fell among the rest, whether he was slain by one of his own
        men to prevent his capture alive, or whether by the enemy because he
        was wounded anyway. This was his end.
      note: "Hop 1 alternate: Cassius Dio, Rome vol. 2 (the parley ambush)"
    - pg_id: 19694
      groups: [hop1]
      quote: >-
        He was treacherously seized, and, in the scuffle which ensued, was
        slain by some unknown hand.
      note: "Hop 1 alternate: William Smith, A Smaller History of Rome"
    - pg_id: 10706
      groups: [hop1]
      quote: >-
        was unwilling to serve as a living trophy to the enemy, and sought and
        found death.
      note: "Hop 1 alternate: Mommsen (Crassus dies at the conference at Sinnaca)"
    - pg_id: 16166
      groups: [hop1]
      quote: >-
        in the confusion Crassus was killed, whether by one of his own side
        and with his own consent, or by the hand of a Parthian is uncertain.
      note: "Hop 1 alternate: Rawlinson, Seven Great Monarchies vol. 6 (Parthia)"
    - pg_id: 674
      groups: [hop2]
      quote: >-
        was met by Ventidius, who gave him battle in the country of
        Cyrrhestica, slew a large number of his men, and Pacorus among the
        first. This victory was one of the most renowned achievements of the
        Romans, and fully avenged their defeats under Crassus
      note: "Hop 2: Ventidius' revenge (Plutarch, Antony)"
    - pg_id: 10162
      groups: [hop2]
      quote: >-
        he had paid the Parthians in full through the death of Pacorus for the
        disasters that Roman arms had incurred in the time of Crassus
      note: "Hop 2 alternate: Cassius Dio, Rome vol. 3 (avenged Crassus — both fell on the same day of the year)"
    - pg_id: 19694
      groups: [hop2]
      quote: Ventidius gained a signal victory over them, and Pacorus himself fell in the battle.
      note: "Hop 2 alternate: William Smith, A Smaller History of Rome"
  status: draft

- id: mh-005
  category: multi-hop
  question: Why did the Greek army Xenophon served with have to fight its way home?
  ideal_answer: >-
    Their employer Cyrus the Younger was killed at Cunaxa charging his brother
    King Artaxerxes (struck by a javelin under the eye), leaving the Greeks
    victorious but stranded deep in Persia; then Tissaphernes treacherously
    seized their five generals at a conference and cut down the captains,
    leaving the Ten Thousand leaderless and forced to fight their way to the
    sea.
  gold_spans:
    - pg_id: 1170
      groups: [hop1]
      quote: >-
        As Cyrus delivered the blow, some one struck him with a javelin under
        the eye severely; and in the struggle which then ensued between the
        king and Cyrus and those about them to protect one or other, we have
        the statement of Ctesias as to the number slain 27 on the king's side,
        for he was by his side. On the other, Cyrus himself fell, and eight of
        his bravest companions lay on the top of him.
      note: "Hop 1: Cyrus killed at Cunaxa (Anabasis I.8; '27' is a footnote marker)"
    - pg_id: 1170
      groups: [hop2]
      quote: >-
        On arrival at the doors of Tissaphernes's quarters the generals were
        summoned inside. They were Proxenus the Boeotian, Menon the
        Thessalian, Agias the Arcadian, Clearchus the Laconian, and Socrates
        the Achaean; while the captains remained at the doors. Not long after
        that, at one and the same signal, those within were seized and those
        without cut down
      note: "Hop 2: generals seized (Anabasis II.5)"
    - pg_id: 51182
      groups: [hop1]
      quote: >-
        the battle of Kunaxa was fought, in which, though the Greeks were
        victorious, Cyrus himself lost his life. They were then obliged to
        commence their retreat, which occupied about one year
      note: "Hop 1 alternate: Grote vol. IX states cause and consequence plainly"
    - pg_id: 674
      groups: [hop1]
      quote: >-
        And thus Cyrus falls, as some say, by the hand of the king; as others,
        by the dart of a Carian
      note: "Hop 1 alternate: Plutarch, Artaxerxes (Cyrus's death at Cunaxa)"
    - pg_id: 900006
      groups: [hop1]
      quote: >-
        he was himself wounded in the eye by a Carian soldier, and falling
        from his horse, was presently slain.
      note: "Hop 1 alternate: Bury (new source)"
    - pg_id: 51182
      groups: [hop2]
      quote: >-
        the generals in the interior were detained, put in chains, and carried
