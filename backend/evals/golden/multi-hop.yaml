  question: What revolt broke out in Britain under the emperor who was the last of his dynasty?
  ideal_answer: >-
    The revolt of Boudicca (Buduica), queen of the Iceni, broke out under
    Nero — whom Dio calls the last of the descendants of Aeneas and Augustus.
    While the governor Paulinus was away at Mona she sacked two Roman cities
    with enormous slaughter before being defeated.
