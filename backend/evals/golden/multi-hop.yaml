# Golden set — MULTI-HOP: answering requires combining facts from DIFFERENT
# passages (possibly same work): "Who commanded the fleet at the battle where
# X died?" needs passage A (where X died) + passage B (who commanded there).
# Each hop gets its own gold span. Spec: docs/golden-set.md

- id: mh-001
  category: multi-hop
  question: What city did Alexander found in memory of the horse he had tamed as a boy?
  ideal_answer: >-
    Bucephala, on the Hydaspes. As a boy Alexander tamed the horse Bucephalas
    (turning him toward the sun after noticing he feared his own shadow); when
    the horse died of age and toil after the battle with Porus, Alexander
    founded the city of Bucephala in his memory.
  gold_spans:
    - pg_id: 674
      quote: >-
        he immediately ran to the horse, and taking hold of the bridle, turned
        him directly towards the sun, having, it seems, observed that he was
        disturbed at and afraid of the motion of his own shadow; then letting
        him go forward a little, still keeping the reins in his hand, and
        stroking him gently when he found him begin to grow eager and fiery,
        he let fall his upper garment softly, and with one nimble leap
        securely mounted him
      note: "Hop 1: the taming (Plutarch, Alexander)"
    - pg_id: 46976
      quote: >-
        Alexander founded two cities, one where the battle took place, and the
        other on the spot whence he started to cross the river Hydaspes; the
        former he named Nicaea,[694] after his victory over the Indians, and
        the latter Bucephala in memory of his horse Bucephalas, which died
        there, not from having been wounded by any one, but from the effects
        of toil and old age
      note: "Hop 2: the founding (Arrian V.19; [694] is a footnote marker)"
  status: reviewed

- id: mh-002
  category: multi-hop
  question: How did the wife of the emperor who added Britain to the empire meet her end?
  ideal_answer: >-
    The emperor is Claudius, who invaded Britain to gain a triumph; his wife
    Messalina, after publicly marrying her lover Silius, was ordered to answer
    for her conduct, failed in her attempts at suicide in the gardens of
    Lucullus, and was run through with a sword by a tribune.
  gold_spans:
    - pg_id: 6400
      quote: >-
        Claudius, at the time of his accession, was fifty years of age; and
        though he had hitherto lived apparently unambitious of public honours,
        accompanied with great ostentation, yet he was now seized with a
        desire to enjoy a triumph. As there existed no war, in which he might
        perform some military achievement, his vanity could only be gratified
        by invading a foreign country, where, contrary to the advice contained
        in the testament of Augustus, he might attempt to extend still further
        the limits of the empire. Either Britain, therefore, or some nation on
        the continent, at a great distance from the capital, became the object
        of such an enterprize; and the former was chosen
      note: "Hop 1: Claudius conquers Britain (Suetonius, Claudius disquisition)"
    - pg_id: 6400
      quote: >-
        Again she made an effort, but again her resolution abandoned her; when
        a tribune burst into the gardens, and plunging his sword into her
        body, she instantly expired.
      note: "Hop 2: Messalina's death (same work, distant passage)"
  status: reviewed

- id: mh-003
  category: multi-hop
  question: Who tutored the son of the king who crushed the Greeks at Chaeronea?
  ideal_answer: >-
    Aristotle. The king is Philip of Macedon, victor at Chaeronea (where his
    son Alexander led the charge against the Theban Sacred Band); Philip had
    earlier sent for Aristotle, the most celebrated philosopher of the age, to
    instruct Alexander, rewarding him by rebuilding his native Stagira.
  gold_spans:
    - pg_id: 674
      quote: >-
        At the battle of Chaeronea, which his father fought against the
        Grecians, he is said to have been the first man that charged the
        Thebans' sacred band.
      note: "Hop 1: Philip–Chaeronea–son link (Plutarch, Alexander)"
    - pg_id: 61469
      quote: >-
        In the field of battle near Chæroneia, Philip himself commanded a
        chosen body of troops on the wing opposed to the Athenians, while his
        youthful son, Alexander, aided by experienced officers, commanded
        against the Thebans on the other wing.
      note: "Hop 1 alternate: Grote vol. XI"
    - pg_id: 674
      quote: >-
        he sent for Aristotle, the most learned and most cerebrated
        philosopher of his time, and rewarded him with a munificence
        proportionable to and becoming the care he took to instruct his son
      note: >-
        Hop 2: Aristotle hired as tutor (Plutarch; "cerebrated" is a
        typo in the canonical text — keep verbatim)
  status: reviewed

- id: mh-004
  category: multi-hop
  question: Who avenged the Roman commander killed at Carrhae?
  ideal_answer: >-
    Ventidius (Publius Ventidius Bassus), Antony's lieutenant. The commander
    killed at Carrhae was Crassus, slain at a treacherous parley after the
    defeat by the Parthians; Ventidius later defeated the Parthians in three
    battles, killing prince Pacorus, a victory Plutarch says "fully avenged"
    the defeats under Crassus.
  gold_spans:
    - pg_id: 674
      quote: >-
        Crassus was killed by a Parthian, called Pomaxathres; others say, by a
        different man, and that Pomaxathres only cut off his head and right
        hand after he had fallen.
      note: "Hop 1: Crassus' death (Plutarch, Crassus)"
    - pg_id: 674
      quote: >-
        was met by Ventidius, who gave him battle in the country of
        Cyrrhestica, slew a large number of his men, and Pacorus among the
        first. This victory was one of the most renowned achievements of the
        Romans, and fully avenged their defeats under Crassus
      note: "Hop 2: Ventidius' revenge (Plutarch, Antony)"
  status: reviewed

- id: mh-005
  category: multi-hop
  question: Why did the Greek army Xenophon served with have to fight its way home?
  ideal_answer: >-
    Their employer Cyrus the Younger was killed at Cunaxa charging his brother
    King Artaxerxes (struck by a javelin under the eye), leaving the Greeks
    victorious but stranded deep in Persia; then Tissaphernes treacherously
    seized their five generals at a conference and cut down the captains,
    leaving the Ten Thousand leaderless and forced to fight their way to the
    sea.
  gold_spans:
    - pg_id: 1170
      quote: >-
        As Cyrus delivered the blow, some one struck him with a javelin under
        the eye severely; and in the struggle which then ensued between the
        king and Cyrus and those about them to protect one or other, we have
        the statement of Ctesias as to the number slain 27 on the king's side,
        for he was by his side. On the other, Cyrus himself fell, and eight of
        his bravest companions lay on the top of him.
      note: "Hop 1: Cyrus killed at Cunaxa (Anabasis I.8; '27' is a footnote marker)"
    - pg_id: 1170
      quote: >-
        On arrival at the doors of Tissaphernes's quarters the generals were
        summoned inside. They were Proxenus the Boeotian, Menon the
        Thessalian, Agias the Arcadian, Clearchus the Laconian, and Socrates
        the Achaean; while the captains remained at the doors. Not long after
        that, at one and the same signal, those within were seized and those
        without cut down
      note: "Hop 2: generals seized (Anabasis II.5)"
    - pg_id: 51182
      quote: >-
        the battle of Kunaxa was fought, in which, though the Greeks were
        victorious, Cyrus himself lost his life. They were then obliged to
        commence their retreat, which occupied about one year
      note: "Hop 1 alternate: Grote vol. IX states cause and consequence plainly"
  status: reviewed

- id: mh-006
  category: multi-hop
  question: How did Alexander react on finding the tomb of the founder of the Persian empire desecrated?
  ideal_answer: >-
    Finding the tomb of Cyrus (whose epitaph read "I am Cyrus, son of
    Cambyses, who founded the empire of the Persians") dug through and
    pillaged at Pasargadae, Alexander was grieved; he commissioned Aristobulus
    to restore the tomb and its furnishings, seal the entrance, and he had the
    Magian guards arrested and tortured to find the culprits.
  gold_spans:
    - pg_id: 46976
      quote: >-
        Upon the tomb an inscription in Persian letters had been placed, which
        bore the following meaning in the Persian language: “O man, I am
        Cyrus, son of Cambyses, who founded the empire of the Persians, and
        was king of Asia. Do not therefore grudge me this monument.”
      note: "Hop 1: Cyrus = founder (Arrian VI.29, the epitaph)"
    - pg_id: 46976
      quote: >-
        He was grieved by the outrage committed upon the tomb of Cyrus, son of
        Cambyses; for according to Aristobulus, he found it dug through and
        pillaged.
      note: "Hop 2: the grief (Arrian VI.29, separate chunk)"
    - pg_id: 46976
      quote: >-
        Aristobulus says that he was himself commissioned by Alexander to
        restore the tomb for Cyrus, to put in the coffin the parts of the body
        still preserved, to put the lid on, and to restore the parts of the
        coffin which had been defaced.
      note: "Hop 2 continued: the restoration order"
  notes: >-
    All hops within Arrian's long tomb chapter, but spread across multiple
    chunks at our chunk size — still a genuine multi-chunk retrieval test.
  status: reviewed

- id: mh-007
  category: multi-hop
  question: Which Spartan commanded the Greeks at the land battle fought the same day as the sea battle at Mycale?
  ideal_answer: >-
    Pausanias, son of Cleombrotos (regent for Leonidas' young son
    Pleistarchos). Herodotus reports that the victory at Plataea and the
    fight at Mycale fell on the same day, and that Pausanias was appointed to
    lead the Spartan army that won at Plataea.
  gold_spans:
    - pg_id: 2456
      quote: >-
        when the day of the defeat at Plataia and of that which was about to
        take place at Mycale happened to be the same, a rumour came to the
        Hellenes here, so that the army was encouraged much more and was more
        eagerly desirous to face the danger
      note: "Hop 1: same-day coincidence (Herodotus IX.100)"
    - pg_id: 2456
      quote: >-
        they sent out five thousand Spartans, with no less than seven of the
        Helots set to attend upon each man of them, 901 appointing Pausanias
        the son of Cleombrotos to lead them forth
      note: "Hop 2: Pausanias appointed commander (Herodotus IX.10; '901' is a footnote marker)"
  notes: >-
    Caveat: IX.101 ("a victory had been already gained by the Hellenes with
    Pausanias") nearly answers both hops in one passage — the hop-1 span sits
    adjacent to it. Grote vol. V also narrates Pausanias at Plataea but no
    single plain-answer chunk surfaced.
  status: reviewed

- id: mh-008
  category: multi-hop
  question: How did the statesman who championed Athens' Long Walls die?
  ideal_answer: >-
    Pericles — who, as Socrates attested, proposed the long wall to the
    people — died of the plague of Athens, in his case not with violent fits
    but as a dull, lingering distemper that slowly wasted his body and mind.
  gold_spans:
    - pg_id: 674
      quote: >-
        the long wall, which Socrates says he himself heard Pericles propose
        to the people, was undertaken by Callicrates.
      note: "Hop 1: Pericles and the Long Walls (Plutarch, Pericles)"
    - pg_id: 674
      quote: >-
        the plague seized Pericles, not with sharp and violent fits, as it did
        others that had it, but with a dull and lingering distemper, attended
        with various changes and alterations, leisurely, by little and little,
        wasting the strength of his body, and undermining the noble faculties
        of his soul.
      note: "Hop 2: his death by plague (same Life, distant passage)"
  status: reviewed

- id: mh-009
  category: multi-hop
  question: How did the two leading assassins of Caesar die?
  ideal_answer: >-
    Both died at Philippi. Cassius, mistakenly believing the battle lost,
    bared his neck to his freedman Pindarus and was beheaded; in the second
    battle Brutus, defeated, fell on his sword — held, by some accounts, by
    his friend Strato — and died.
  gold_spans:
    - pg_id: 674
      quote: >-
        pulling up his mantle over his head, he made his neck bare, and held
        it forth to Pindarus, commanding him to strike. The head was certainly
        found lying severed from the body.
      note: "Hop 1: Cassius' death (Plutarch, Brutus)"
    - pg_id: 674
      quote: >-
        Him he placed next to himself, and, taking hold of the hilt of his
        sword and directing it with both his hands, he fell upon it, and
        killed himself. But others say, that not he himself, but Strato, at
        the earnest entreaty of Brutus, turning aside his head, held the
        sword, upon which he violently throwing himself, it pierced his
        breast, and he immediately died.
      note: "Hop 2: Brutus' suicide (Plutarch, Brutus)"
  status: reviewed

- id: mh-010
  category: multi-hop
  question: What revolt broke out in Britain under the emperor who was the last of his dynasty?
  ideal_answer: >-
    The revolt of Boudicca (Buduica), queen of the Iceni, broke out under
    Nero — whom Dio calls the last of the descendants of Aeneas and Augustus.
    While the governor Paulinus was away at Mona she sacked two Roman cities
    with enormous slaughter before being defeated.
  gold_spans:
    - pg_id: 10890
      quote: >-
        Of the descendants of Aeneas and of Augustus he was the last, as was
        plainly indicated by the fact that the laurels planted by Livia and
        the breed of white chickens perished somewhat before his death.
      note: "Hop 1: Nero last of the dynasty (Dio LXIII)"
    - pg_id: 10890
      quote: >-
        Buduica led her army against the Romans. The latter chanced to be
        without a leader for the reason that Paulinus their commander had gone
        on an expedition to Mona, an island near Britain. This enabled her to
        sack and plunder two Roman cities, and, as I said, she wrought
        indescribable slaughter.
      note: "Hop 2: the revolt under Nero (Dio LXII)"
    - pg_id: 6400
      quote: >-
        The successes of Boadicea, queen of the Iceni, who inhabited
        Derbyshire, were probably the cause of Nero’s wishing to withdraw the
        legions; she having reduced London, Colchester, and Verulam, and put
        to death seventy thousand of the Romans and their British allies.
      note: "Hop 2 alternate: Suetonius translator's footnote 578 — names the revolt and Nero"
  status: reviewed
