- id: synth-015
  category: synthesis
  question: How does Strabo portray the decayed condition of the once-great cities of Greece in his own day?
  ideal_answer: >-
    Strabo repeatedly registers how the once-great cities of Greece had dwindled
    or vanished by his own day. In the Argolid "some of the cities mentioned in
    the Catalogue of the Ships, and said to be subject to Argos, have
    disappeared." In Arcadia the famous cities — Mantinea, Orchomenus, Heraea,
    Cleitor, Pheneus, Stymphalus and the rest — "either exist no longer, or
    traces and signs only of their existence are visible," the country sunk into
    a deserted condition. Lesser towns such as Dyspontium "was razed, and the
    greatest part of the inhabitants removed" abroad. Even Corinth had been
    sacked, Strabo recalling Polybius's eyewitness account of the soldiers'
    indifference to its art and sacred offerings. The recurring note is
    depopulation and ruin set against a glorious past.
  gold_spans:
    - pg_id: 44885
      quote: >-
        some of the cities mentioned in the Catalogue of the Ships, and said to
        be subject to Argos, have disappeared
      note: Geography VIII.6 — Homeric cities of the Argolid now vanished
    - pg_id: 44885
      quote: either exist no longer, or traces and signs only of their existence are visible
      note: Geography VIII.8 — the decayed cities of Arcadia (Mantinea, Orchomenus, etc.)
    - pg_id: 44885
      quote: >-
        But it was razed, and the greatest part of the inhabitants removed to
        Epidamnus and Apollonia
      note: Geography VIII.3 — Dyspontium razed and depopulated
    - pg_id: 44885
      quote: >-
        Polybius relates with regret what occurred at the capture of the city,
        and speaks of the indifference the soldiers showed for works of art
      note: Geography VIII.6 — the Roman sack of Corinth
  status: reviewed

- id: synth-016
  category: synthesis
  question: How does Polybius explain the natural cycle by which forms of government rise and degenerate?
  ideal_answer: >-
    In Book VI Polybius lays out the natural cycle (anacyclosis) by which
    constitutions rise and decay. Society begins under the rule of the
    strongest, but once a leader rewards merit and protects the weak, men "no
    longer obey him and support his rule from fear of violence, but rather from
    conviction of its utility" — force matures into legitimate kingship. Each
    good form then breeds its corrupt twin: kingship into tyranny, aristocracy
    into oligarchy, and democracy into mob-violence, where "tumultuous
    assemblies, massacres, banishments, redivisions of land" reduce the state
    until "it has once more found a master and a despot." "This is the regular
    cycle of constitutional revolutions." The escape is the mixed constitution:
    "Lycurgus... combined together all the excellences and distinctive features
    of the best constitutions, that no part should become unduly predominant" —
    the balance Polybius finds perfected at Rome.
  gold_spans:
    - pg_id: 44125
      quote: >-
        they no longer obey him and support his rule from fear of violence, but
        rather from conviction of its utility
      note: Histories VI.6 — force matures into legitimate kingship
    - pg_id: 44125
      quote: >-
        Then come tumultuous assemblies, massacres, banishments, redivisions of
        land; until, after losing all trace of civilisation, it has once more
        found a master and a despot
      note: Histories VI.9 — democracy degenerates into mob-rule and back to despotism
    - pg_id: 44125
      quote: >-
        This is the regular cycle of constitutional revolutions, and the natural
        order in which constitutions change, are transformed
      note: Histories VI.9 — the thesis statement of the cycle (anacyclosis)
    - pg_id: 44125
      quote: >-
        Lycurgus, I say, saw all this, and accordingly combined together all the
        excellences and distinctive features of the best constitutions, that no
        part should become unduly predominant
      note: Histories VI.10 — the mixed constitution as the escape from the cycle
  notes: >-
    Book VI is in Polybius Vol. I (#44125), NOT Vol. II (#44126) as the draft
    candidate guessed — Vol. II is Books X-XXXIX. The anacyclosis text resolves
    only in #44125 (the cycle vocabulary is wholly absent from #44126).
  status: reviewed

- id: synth-017
  category: synthesis
  question: How does Polybius describe the organization and discipline of the Roman army?
  ideal_answer: >-
    Polybius's Book VI admires the Roman army as a machine of organization and
    discipline. At the levy the military tribunes "muster their men" and bind
    each with an oath "that he will obey his officers," before sorting them into
    velites, hastati, principes and triarii. On campaign they entrench a
    standardized camp on one fixed plan, the general's Praetorium sited first
    and the streets laid out around it. Discipline is enforced by fear: a cohort
    that flees is decimated, the tribune selecting by lot "about a tenth of
    those who have been guilty of the act of cowardice" for the fustuarium;
    valour, by contrast, is so publicly rewarded that brave men become "marked
    men in all solemn festivals." Polybius caps the account by contrast — in
    land service "the Romans train themselves to a much higher pitch than the
    Carthaginians," who "wholly neglect their infantry."
  gold_spans:
    - pg_id: 44125
      quote: >-
        the tribunes belonging to the several legions muster their men; and
        selecting one of the whole body that they think most suitable for the
        purpose, they cause him to take an oath that he will obey his officers
      note: Histories VI.21 — the levy and the soldier's oath
    - pg_id: 44125
      quote: >-
        Their method of laying out a camp is as follows. The place for the camp
        having been selected, the spot in it best calculated to give a view of
        the whole, and most convenient for issuing orders
      note: Histories VI.27 — the standardized marching camp
    - pg_id: 44125
      quote: >-
        selects five or eight or twenty out of them by lot, so that those
        selected should be about a tenth of those who have been guilty of the
        act of cowardice
      note: Histories VI.38 — decimation and the fustuarium
    - pg_id: 44125
      quote: >-
        the recipients of such rewards not only enjoy great glory among their
        comrades in the army, and an immediate reputation at home
      note: Histories VI.39 — the rewards for valour
    - pg_id: 44125
      quote: >-
        the Romans train themselves to a much higher pitch than the
        Carthaginians. The former bestow their whole attention upon this
        department: whereas the Carthaginians wholly neglect their infantry
      note: Histories VI.52 — the contrast Polybius draws with other military systems
  notes: Same volume correction as synth-016 — Book VI lives in Vol. I (#44125).
  status: reviewed

- id: synth-018
  category: synthesis
  question: How does Livy portray Hannibal as Rome's great antagonist across the Second Punic War?
  ideal_answer: >-
    Livy makes Hannibal Rome's supreme antagonist, drawn double-edged from the
    first: matchless "high virtues of the hero" shadowed by "inhuman cruelty,
    more than Punic perfidy, no truth... no fear of the gods, no respect for
    oaths." He proves the virtues at once, bringing his army into Italy "in the
    fifth month... having crossed the Alps in fifteen days" through appalling
    loss. Yet Livy fixes the fatal flaw after Cannae, when Maharbal urges an
    instant march on Rome and, refused, retorts "You know how to conquer,
    Hannibal; but you do not know how to make use of your victory" — a delay
    "believed to have been the preservation of the city and the empire." The
    long Italian war winds to its end at Zama, where Hannibal, "after performing
    this as it were his last work of valour, fled to Adrumetum," and confessed
    in the senate "that he was defeated, not only in the battle, but in the war."
  gold_spans:
    - pg_id: 10907
      quote: >-
        Excessive vices counterbalanced these high virtues of the hero; inhuman
        cruelty, more than Punic perfidy, no truth, no reverence for things
        sacred, no fear of the gods, no respect for oaths, no sense of religion
      note: Livy XXI.4 — the double-edged character sketch at Hannibal's introduction
    - pg_id: 10907
      quote: >-
        they came to Italy in the fifth month (as some authors relate) after
        leaving New Carthage, having crossed the Alps in fifteen days
      note: Livy XXI.38 — the crossing of the Alps
    - pg_id: 10907
      quote: You know how to conquer, Hannibal; but you do not know how to make use of your victory
      note: >-
        Livy XXII.51 — Maharbal: the failure to exploit the victory at Cannae
    - pg_id: 12582
      quote: >-
        Hannibal, after performing this as it were his last work of valour, fled
        to Adrumetum
      note: Livy XXX.35 — the final defeat at Zama and Hannibal's flight
  notes: >-
    Single work, but its text is split across two manifest files — #10907 (Livy
    Books 9-26: introduction, Alps, Cannae) and #12582 (Books 27-36: Zama).
