        measuring a furlong both in length and in breadth, and on this tower
        another tower has been erected, and another again upon this, and so on
        up to the number of eight towers.
      note: Temple of Bel ziggurat (I.181; "184"/"185" are footnote markers)
    - pg_id: 2707
      quote: >-
