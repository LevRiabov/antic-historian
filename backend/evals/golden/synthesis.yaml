- id: synth-008
  category: synthesis
  question: How does Suetonius chart Caligula's descent from popular prince to monster?
  ideal_answer: >-
    Suetonius structures the Life around an explicit pivot: "Thus far we have
    spoken of him as a prince. What remains to be said of him, bespeaks him
    rather a monster than a man." His accession brought genuine joy — the
    soldiers' beloved camp-child, heir to Germanicus' virtues — though
    Tiberius had already predicted he was "rearing a hydra for the people of
    Rome." After the pivot comes the monster: claiming divine majesty,
    beheading the gods' statues to mount his own head, the temple to his own
    divinity, and cruelties without limit.
  gold_spans:
    - pg_id: 6400
      quote: >-
        such was the destiny of Rome, that his accession afforded joy to the
        soldiers, who had known him in his childhood, and to the populace in
        the capital, as well as the people in the provinces, who were
        flattered with the delusive expectation of receiving a prince who
        should adorn the throne with the amiable virtues of Germanicus.
      note: The hopeful accession (disquisition)
    - pg_id: 6400
      quote: >-
        he often said, “That Caius was destined to be the ruin of himself and
        all mankind; and that he was rearing a hydra [392] for the people of
        Rome, and a Phaeton for all the world.”
      note: Tiberius' prophecy (XI; "[392]" is a footnote marker)
    - pg_id: 6400
      quote: >-
        Thus far we have spoken of him as a prince. What remains to be said of
        him, bespeaks him rather a monster than a man.
      note: The structural pivot (XXII)
    - pg_id: 6400
      quote: >-
        being told that he far exceeded the grandeur of kings and princes, he
        began to arrogate to himself a divine majesty. He ordered all the
        images of the gods, which were famous either for their beauty, or the
        veneration paid them, among which was that of Jupiter Olympius, to be
        brought from Greece, that he might take the heads off, and put on his
        own.
      note: The monster — divine pretensions (XXII)
  status: reviewed

- id: synth-009
  category: synthesis
  question: How does Tacitus characterize German marriage and the position of women?
  ideal_answer: >-
    With pointed admiration. The marriage gifts — oxen, a bridled horse,
    shield, spear, and sword — admonish the wife that she comes as a partner
    in toils and dangers, "to suffer and to dare equally with him, in peace
    and in war... thus she is to live; thus to die." The Germans live "fenced
    around with chastity": adultery is extremely rare and instantly punished,
    no one calls seduction the way of the world, and in the strictest tribes
    a woman takes one husband "as one body and one life."
  gold_spans:
    - pg_id: 7524
      quote: >-
        she is admonished by the very ceremonial of her marriage, that she
        comes to her husband as a partner in toils and dangers; to suffer and
        to dare equally with him, in peace and in war: this is indicated by
        the yoked oxen, the harnessed steed, the offered arms. Thus she is to
        live; thus to die.
      note: The marriage ceremony's meaning (Germania 18)
    - pg_id: 7524
      quote: >-
        They live, therefore, fenced around with chastity; [110] corrupted by
        no seductive spectacles, [111] no convivial incitements. Men and women
        are alike unacquainted with clandestine correspondence. Adultery is
        extremely rare among so numerous a people.
      note: Chastity (Germania 19; bracketed numbers are footnote markers)
    - pg_id: 7524
      quote: >-
        Thus, they take one husband as one body and one life; that no thought,
        no desire, may extend beyond him; and he may be loved not only as
        their husband, but as their marriage.
      note: One husband for life (Germania 19)
  status: reviewed

- id: synth-010
  category: synthesis
  question: How does Suetonius portray the character of Tiberius?
  ideal_answer: >-
    As a dissimulating tyrant whose vices, long imperfectly concealed,
    flowered once he withdrew to Capri. Even Augustus reportedly pitied the
    Roman people for being "ground by the jaws of such a slow devourer." The
    soldiers' nickname Biberius marked his drunkenness from youth; at Capri,
    "remote from the observation of the people of Rome, he abandoned himself
    to all the vicious propensities which he had long but imperfectly
    concealed"; and the translator's verdict is of an "execrable tyrant"
    whose indiscriminate cruelty spared neither age nor sex.
  gold_spans:
    - pg_id: 6400
      quote: >-
        upon Tiberius’s quitting the room, after their private conference,
        those who were in waiting overheard Augustus say, “Ah! unhappy Roman
        people, to be ground by the jaws of such a slow devourer!”
      note: Augustus' verdict (XXI)
    - pg_id: 6400
      quote: >-
        While a young soldier in the camp, he was so remarkable for his
        excessive inclination to wine, that, for Tiberius, they called him
        Biberius; for Claudius, Caldius; and for Nero, Mero.
      note: The Biberius nickname (XLII)
    - pg_id: 6400
      quote: >-
        But having now the advantage of privacy, and being remote from the
        observation of the people of Rome, he abandoned himself to all the
        vicious propensities which he had long but imperfectly concealed
      note: The Capri unmasking (XLII)
    - pg_id: 6400
      quote: >-
        Human nature recoils with horror at the cruelties of this execrable
        tyrant, who, having first imbrued his hands in the blood of his own
        relations, proceeded to exercise them upon the public with
        indiscriminate fury. Neither age nor sex afforded any exemption from
        his insatiable thirst for blood.
      note: The cruelty summation (translator's disquisition)
  status: reviewed
