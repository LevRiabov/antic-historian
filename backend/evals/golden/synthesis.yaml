- id: synth-012
  category: synthesis
  question: How does Josephus characterize the reign of Herod the Great?
  ideal_answer: >-
    Josephus draws Herod as a king of dazzling success abroad and monstrous
    cruelty at home. He stood so high in Rome's favour that "he arrived at that
    pitch of felicity" of being, after Agrippa, the man Caesar valued most, and
    he crowned his reign with vast building works, "undertaking a very great
    work, that is, to build of himself the temple of God," alongside Caesarea
    and his fortresses. Yet the suspicion that secured his throne consumed his
    own household: he had his beloved wife tried and executed — "thus was
    Mariamne led to execution" — and later his sons. His end matched his
    cruelty: a loathsome disease in which "his privy-member was putrefied, and
    produced worms," which Josephus reads as divine punishment.
  gold_spans:
    - pg_id: 2848
      quote: >-
        he arrived at that pitch of felicity, that whereas there were but two
        men that governed the vast Roman empire
      note: Antiquities XV — the favour of Rome and the splendour of the reign
    - pg_id: 2848
      quote: >-
        undertook a very great work, that is, to build of himself the temple of
        God
      note: Antiquities XV.11 — the great building works (the temple)
    - pg_id: 2848
      quote: and thus was Mariamne led to execution
      note: Antiquities XV — the suspicion and murders within his own family
    - pg_id: 2848
      quote: >-
        his privy-member was putrefied, and produced worms; and when he sat
        upright
      note: Antiquities XVII.6 — the disease-ridden death, read as divine judgement
  status: reviewed

- id: synth-013
  category: synthesis
  question: How does Tacitus portray the role of the armies in making and unmaking emperors in the civil war?
  ideal_answer: >-
    Tacitus makes the legions the true power in the state. The convulsion of 69
    laid bare "that secret of the empire, that emperors could be made elsewhere
    than at Rome" — sovereignty now belonged to whichever army would proclaim
    its general. That loyalty was bought: the city soldiery turned on Nero and
    were inclined to change "when they found that the donative promised in
    Galba's name was withheld," and under each claimant discipline dissolved —
    "Much however as Vitellius indulged his generals, his soldiers enjoyed yet
    greater licence." The praetorians embodied the menace, bursting in arms upon
    Otho's banquet and threatening the Senate. Throughout, emperors are made and
    unmade by the greed, licence, and violence of the soldiery.
  gold_spans:
    - pg_id: 900002
      quote: >-
        now had been divulged that secret of the empire, that emperors could be
        made elsewhere than at Rome
      note: Histories I.4 — the "secret of empire" revealed
    - pg_id: 900002
      quote: the donative promised in Galba's name was withheld
      note: Histories I.5 — loyalty bought and sold; the withheld donative
    - pg_id: 900002
      quote: >-
        Much however as Vitellius indulged his generals, his soldiers enjoyed
        yet greater licence
      note: Histories II — the licence and indiscipline of the soldiery
    - pg_id: 900002
      quote: They burst in upon the banquet with loud demands that Otho should shew himself
      note: Histories I — the praetorians' menace over the throne
  status: reviewed

- id: synth-014
  category: synthesis
  question: How does Xenophon portray the rule and downfall of the Thirty Tyrants at Athens?
  ideal_answer: >-
    Xenophon shows the Thirty beginning with popular approval and ending in
    bloody tyranny and overthrow. At first they prosecuted the informers and
    base men of the democracy, and "the new senate gladly recorded its vote of
    condemnation against them"; but they soon turned to plunder and murder,
    passing a resolution "empowering each of the committee to seize on one of
    the resident aliens apiece, to put his victim to death, and to confiscate
    his property." Their rule grew so murderous that in eight months they had
    "slain almost more men than the Peloponnesians together in ten years of
    warfare." When Theramenes resisted Critias he was struck off the roll and
    "dragged through the Agora" to his death. Finally Thrasybulus and the exiles
    from Phyle prevailed, and the Athenians "reappointed the several
    magistrates; the constitution began to work afresh, and civic life was
    recommenced."
  gold_spans:
    - pg_id: 1174
