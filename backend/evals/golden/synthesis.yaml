- id: synth-011
  category: synthesis
  question: How does Josephus portray the factional strife among the Jews that doomed Jerusalem?
  ideal_answer: >-
    Josephus presents the fall of Jerusalem as a self-inflicted catastrophe of
    civil war within the walls. The zealots fractured into rival factions —
    Eleazar son of Simon making "the first separation of the zealots from the
    people" and seizing the inner temple, against John of Gischala and, in the
    city, Simon — until there were "three treacherous factions" fighting one
    another even as Titus besieged them. In that warfare they burned the
    storehouses, so that almost all the corn "which would have been sufficient
    for a siege of many years" was destroyed and the people were "taken by the
    means of the famine" their own leaders had prepared. The common people were
    "their prey on both sides," and Josephus moralizes that no age ever bred "a
    generation more fruitful in wickedness" — the Jews destroyed themselves.
  gold_spans:
    - pg_id: 2850
      quote: >-
        who made the first separation of the zealots from the people, and made
        them retire into the temple
      note: Wars V — Eleazar splits off a third faction; the rise of the factions
    - pg_id: 2850
      quote: >-
        almost all that corn was burnt, which would have been sufficient for a
        siege of many years. So they were taken by the means of the famine
      note: Wars V — the factions burn the grain stores, bringing on the famine
    - pg_id: 2850
      quote: >-
        Now, while these factions fought one against another, the people were
        their prey on both sides, as we have said already
      note: Wars V — the people caught between the warring factions during the siege
    - pg_id: 2850
