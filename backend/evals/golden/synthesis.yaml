- id: synth-010
  category: synthesis
  question: How does Suetonius portray the character of Tiberius?
  ideal_answer: >-
    As a dissimulating tyrant whose vices, long imperfectly concealed,
    flowered once he withdrew to Capri. Even Augustus reportedly pitied the
    Roman people for being "ground by the jaws of such a slow devourer." The
    soldiers' nickname Biberius marked his drunkenness from youth; at Capri,
    "remote from the observation of the people of Rome, he abandoned himself
    to all the vicious propensities which he had long but imperfectly
    concealed"; and the translator's verdict is of an "execrable tyrant"
    whose indiscriminate cruelty spared neither age nor sex.
  gold_spans:
    - pg_id: 6400
      quote: >-
        upon Tiberius’s quitting the room, after their private conference,
        those who were in waiting overheard Augustus say, “Ah! unhappy Roman
        people, to be ground by the jaws of such a slow devourer!”
      note: Augustus' verdict (XXI)
    - pg_id: 6400
      quote: >-
        While a young soldier in the camp, he was so remarkable for his
        excessive inclination to wine, that, for Tiberius, they called him
        Biberius; for Claudius, Caldius; and for Nero, Mero.
      note: The Biberius nickname (XLII)
    - pg_id: 6400
      quote: >-
        But having now the advantage of privacy, and being remote from the
        observation of the people of Rome, he abandoned himself to all the
        vicious propensities which he had long but imperfectly concealed
      note: The Capri unmasking (XLII)
    - pg_id: 6400
