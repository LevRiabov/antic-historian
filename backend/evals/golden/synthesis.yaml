- id: synth-008
  category: synthesis
  question: How does Suetonius chart Caligula's descent from popular prince to monster?
  ideal_answer: >-
    Suetonius structures the Life around an explicit pivot: "Thus far we have
    spoken of him as a prince. What remains to be said of him, bespeaks him
    rather a monster than a man." His accession brought genuine joy — the
    soldiers' beloved camp-child, heir to Germanicus' virtues — though
    Tiberius had already predicted he was "rearing a hydra for the people of
    Rome." After the pivot comes the monster: claiming divine majesty,
    beheading the gods' statues to mount his own head, the temple to his own
    divinity, and cruelties without limit.
  gold_spans:
    - pg_id: 6400
      quote: >-
        such was the destiny of Rome, that his accession afforded joy to the
        soldiers, who had known him in his childhood, and to the populace in
        the capital, as well as the people in the provinces, who were
        flattered with the delusive expectation of receiving a prince who
        should adorn the throne with the amiable virtues of Germanicus.
      note: The hopeful accession (disquisition)
    - pg_id: 6400
      quote: >-
        he often said, “That Caius was destined to be the ruin of himself and
        all mankind; and that he was rearing a hydra [392] for the people of
        Rome, and a Phaeton for all the world.”
      note: Tiberius' prophecy (XI; "[392]" is a footnote marker)
    - pg_id: 6400
      quote: >-
        Thus far we have spoken of him as a prince. What remains to be said of
        him, bespeaks him rather a monster than a man.
      note: The structural pivot (XXII)
    - pg_id: 6400
