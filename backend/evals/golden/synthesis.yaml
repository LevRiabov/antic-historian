- id: synth-009
  category: synthesis
  question: How does Tacitus characterize German marriage and the position of women?
  ideal_answer: >-
    With pointed admiration. The marriage gifts — oxen, a bridled horse,
    shield, spear, and sword — admonish the wife that she comes as a partner
    in toils and dangers, "to suffer and to dare equally with him, in peace
    and in war... thus she is to live; thus to die." The Germans live "fenced
    around with chastity": adultery is extremely rare and instantly punished,
    no one calls seduction the way of the world, and in the strictest tribes
    a woman takes one husband "as one body and one life."
  gold_spans:
    - pg_id: 7524
      quote: >-
        she is admonished by the very ceremonial of her marriage, that she
        comes to her husband as a partner in toils and dangers; to suffer and
        to dare equally with him, in peace and in war: this is indicated by
        the yoked oxen, the harnessed steed, the offered arms. Thus she is to
        live; thus to die.
      note: The marriage ceremony's meaning (Germania 18)
    - pg_id: 7524
      quote: >-
        They live, therefore, fenced around with chastity; [110] corrupted by
        no seductive spectacles, [111] no convivial incitements. Men and women
        are alike unacquainted with clandestine correspondence. Adultery is
        extremely rare among so numerous a people.
      note: Chastity (Germania 19; bracketed numbers are footnote markers)
    - pg_id: 7524
