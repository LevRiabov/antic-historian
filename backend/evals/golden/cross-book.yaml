- id: cb-019
  category: cross-book
  question: How do the sources describe the war against Jugurtha of Numidia?
  ideal_answer: >-
    The sources frame the war as much by Roman corruption as by arms. Appian
    preserves Jugurtha's famous verdict on the venal city — that "the whole city
    of Rome could be bought if a purchaser could be found for it." Plutarch
    follows the endgame through the Numidian kings: after Jugurtha fled and "in
    his distress came to [Bocchus] as his last hope," he was received as a
    suppliant and then betrayed. Livy's epitome records the capture plainly —
    Bocchus, beaten and unwilling to fight on, "delivered up Jugurtha in chains
    to Marius."
