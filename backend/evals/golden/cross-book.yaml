- id: cb-016
  category: cross-book
  question: How do the sources describe the final destruction of Carthage?
  ideal_answer: >-
    Appian gives the fullest narrative of 146 BC: as the city of 700 years came
    to its end, Scipio "is said to have shed tears and publicly lamented the
    fortune of the enemy," reflecting on the mutability that would one day
    overtake Rome itself. Polybius, his tutor and an eyewitness, records the same
    reflection on the fall of "the once mighty empires of the Assyrians, Medes,
    Persians" and Macedon, with Scipio quoting Homer on the doom of Troy. The
    epitome of Livy registers the bare outcome — Scipio "at length took the city
    by storm, in the seven hundredth year after its foundation."
