  question: How do the sources describe the Spartan system of government attributed to Lycurgus?
  ideal_answer: >-
    The sources credit Lycurgus with a mixed, balanced constitution. Plutarch
    singles out the central institution: "the first and of greatest importance
    was the establishment of the senate," a council of twenty-eight elders whose
    power, equal to the kings', acted "like ballast in a ship" between monarchy
    and democracy. Herodotus gives the early Greek account of the same
    transformation — once Lycurgus had reformed their institutions "the Spartans
    had good laws," and after his death "they erected a temple" to him and paid
    him great worship.
