- id: cb-023
  category: cross-book
  question: What do the sources report about the oracle at Delphi — its setting, procedure, and authority?
  ideal_answer: >-
    The sources present Delphi as the most authoritative and richest of Greek
    shrines. Strabo records its divine charter — that "Apollo, by the aid of
    Themis, established this oracle with a view to benefit the human race."
    Pausanias preserves its ancient history, that "in the most ancient times it
    was the oracle of Earth" before it passed to Apollo. Diodorus shows the other
    side of its fame, the immense treasure that made it a target: in the Sacred
    War the Phocian leader's "brother and successor Onomarchus converted much of
    those treasures" to pay his troops, the sacrilege that defined the conflict.
  gold_spans:
