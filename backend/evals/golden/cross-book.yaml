- id: cb-001
  category: cross-book
  question: How do the sources judge Alcibiades?
  ideal_answer: >-
    Thucydides judges that his lawless personal extravagance — horses and
    expenditure beyond his means — made the people fear him as an aspiring
    tyrant, "and this later on had not a little to do with the ruin of the
    Athenian state," though his public war conduct was excellent. Plutarch
    fixes on his chameleon-like versatility, adapting to Spartan austerity or
    Persian pomp at will. Grote, the modern voice, grants him boldness,
    resource, and vigor "not surpassed by any contemporary Greek" while
    damning his want of public principle. Bury, a second modern voice,
    judges him a born politician but no statesman — lacking the purpose,
    perseverance, and self-control that statesmanship demands.
  gold_spans:
    - pg_id: 7142
      quote: >-
        For the position he held among the citizens led him to indulge his
        tastes beyond what his real means would bear, both in keeping horses
        and in the rest of his expenditure; and this later on had not a little
        to do with the ruin of the Athenian state. Alarmed at the greatness of
        his licence in his own life and habits, and of the ambition which he
        showed in all things soever that he undertook, the mass of the people
        set him down as a pretender to the tyranny, and became his enemies
      note: Thucydides VI.15
    - pg_id: 674
      quote: >-
        he had, as it was observed, this peculiar talent and artifice for
        gaining men's affections, that he could at once comply with and really
        embrace and enter into their habits and ways of life, and change
        faster than the chameleon.
      note: Plutarch, Alcibiades — the chameleon
    - pg_id: 51181
      quote: >-
        From the beginning to the end of his eventful political life, he
        showed a combination of boldness in design, resource in contrivance,
        and vigor in execution, not surpassed by any one of his contemporary
        Greeks: and what distinguished him from all was his extraordinary
        flexibility of character[60] and consummate power of adapting himself
        to new habits, new necessities, and new persons, whenever
        circumstances required.
      note: Grote vol. VII ("[60]" is a footnote marker)
    - pg_id: 900006
      quote: >-
        Alcibiades indeed had not in him the stuff of which true statesmen
        are made; he had not the purpose, the perseverance, or the
        self-control. An extremely able and dexterous politician he certainly
        was; but he wanted that balance which a politician, whether scrupulous
        or unscrupulous, must have in order to be a great statesman.
      note: Bury, History of Greece — the modern verdict
  status: draft

- id: cb-002
  category: cross-book
  question: How do the sources judge Themistocles?
  ideal_answer: >-
    Herodotus reports he was esteemed throughout Hellas as "the ablest by far
    of the Hellenes" and uniquely honored at Sparta. Thucydides' obituary
    calls his untaught native genius for instant judgment and prediction
    "quite extraordinary and unparalleled." Grote balances the picture: his
    rapacity made him hated and feared among the allies, and the suspicions
    of treasonable medism at Athens grew from his own corrupt and
    double-faced conduct. Bury, a later modern voice, credits the man of
    genius who made Athens a sea-power as the greatest of all her statesmen.
  gold_spans:
    - pg_id: 2456
      quote: >-
        Themistocles was loudly reported of and was esteemed throughout Hellas
        to be the man who was the ablest 89 by far of the Hellenes
      note: Herodotus VIII.124 ("89" is a footnote marker)
    - pg_id: 7142
      quote: >-
        For Themistocles was a man who exhibited the most indubitable signs of
        genius; indeed, in this particular he has a claim on our admiration
        quite extraordinary and unparalleled. By his own native capacity,
        alike unformed and unsupplemented by study, he was at once the best
        judge in those sudden crises which admit of little or of no
        deliberation, and the best prophet of the future, even to its most
        distant possibilities.
      note: Thucydides I.138 — the character sketch
    - pg_id: 62098
      quote: >-
        must have caused Themistoklês to be both hated and feared among the
        insular allies, whose opinion was now of considerable importance to
        the Athenians. A similar sentiment grew up partially against him in
        Athens itself, and appears to have been connected with suspicions of
        treasonable inclinations towards the Persians.
      note: Grote vol. V — the dark side
    - pg_id: 900006
      quote: >-
        Themistocles had made his city a sea-power ; and this feat approved
        him the greatest of all her statesmen. He was a man of genius.
      note: Bury, History of Greece — the modern verdict
  status: draft

- id: cb-003
  category: cross-book
  question: How is the disaster at Cannae described?
  ideal_answer: >-
    Polybius gives the soldier's accounting: of six thousand Roman horse only
    seventy escaped with Varro, the infantry "died nobly" to the number of
    seventy thousand, both sides fighting with conspicuous gallantry. Dio's
    fragment calls it the most fearful disaster Rome ever suffered, preceded
    by portents and Sibylline prophecy. Mommsen, the modern judge, treats the
    "unexampled success" as the moment Hannibal's grand political combination
    against Rome seemed to mature. Appian tallies the toll — 50,000 Roman dead
    in a few hours, with senators, every tribune and centurion, and both their
    best generals among them. Livy registers the reaction at home: never, while
    the city stood safe, was there so great a panic, at the loss of two
    consular armies and their consuls.
  gold_spans:
    - pg_id: 44125
      quote: >-
        Such was the end of the battle of Cannae, in which both sides fought
        with the most conspicuous gallantry, the conquered no less than the
        conquerors. This is proved by the fact that, out of six thousand
        horse, only seventy escaped with Gaius Terentius to Venusia, and about
        three hundred of the allied cavalry to various towns in the
        neighbourhood.
      note: Polybius III.117
    - pg_id: 18047
      quote: >-
        they encountered elsewhere a fearful disaster, than which they never
        suffered one more terrible either earlier or subsequently. It was
        preceded by certain portents and the solemn verses of the Sibyl which
        had prophesied the disaster to them so many years before.
      note: Cassius Dio (Zonaras fragment), Book XV
    - pg_id: 10706
      quote: >-
        This unexampled success appeared at length to mature the great
        political combination, for the sake of which Hannibal had come to
        Italy.
      note: Mommsen, Book III ch. V
    - pg_id: 900003
      quote: >-
        in these few hours 50,000 of their soldiers were slain and a great
        many taken prisoners. Many senators who were present lost their lives
        and with them all the military tribunes and centurions, and their two
        best generals.
      note: Appian, Hannibalic War 25 — the casualty tally
    - pg_id: 10907
      quote: >-
        Never when the city was in safety was there so great a panic and
        confusion within the walls of Rome.
      note: Livy XXII.54 — the panic at Rome
  status: draft

- id: cb-004
  category: cross-book
  question: How do historians ancient and modern assess Pericles?
  ideal_answer: >-
    Thucydides' famous verdict: by rank, ability, and known integrity he led
    the multitude instead of being led, so that "what was nominally a
    democracy became in his hands government by the first citizen." Plutarch
    gives the deathbed self-assessment — his proudest claim was that "no
    Athenian, through my means, ever wore mourning." Grote notes that his
    immense ascendancy and unparalleled eloquence are attested even more
    forcibly by his enemies than his friends. Bury, more measured, rates him a
    man of finer fibre than Themistocles yet no statesman of originative
    genius — one who perfected the ideas of others rather than creating them.
  gold_spans:
    - pg_id: 7142
      quote: >-
        Pericles indeed, by his rank, ability, and known integrity, was
        enabled to exercise an independent control over the multitude—in
        short, to lead them instead of being led by them; for as he never
        sought power by improper means, he was never compelled to flatter
        them, but, on the contrary, enjoyed so high an estimation that he
        could afford to anger them by contradiction.
      note: Thucydides II.65
    - pg_id: 674
      quote: >-
        He had listened, however, all the while, and attended to all, and
        speaking out among them, said, that he wondered they should commend
        and take notice of things which were as much owing to fortune as to
        anything else, and had happened to many other commanders, and, at the
        same time, should not speak or make mention of that which was the most
        excellent and greatest thing of all. "For," said he, "no Athenian,
        through my means, ever wore mourning."
      note: Plutarch, Pericles — the deathbed verdict
    - pg_id: 54936
      quote: >-
        But his immense and long-continued ascendency, as well as his
        unparalleled eloquence, are facts attested not less by his enemies
        than by his friends,—nay, even more forcibly by the former than by the
        latter.
      note: Grote vol. VI
    - pg_id: 900006
      quote: >-
        Pericles was a man of finer fibre than Themistocles, but he was not
        like Themistocles a statesman of originative genius.
      note: Bury, History of Greece — the modern assessment
  status: draft

- id: cb-005
  category: cross-book
  question: What did ancient writers know and say about Britain and its people?
  ideal_answer: >-
    Caesar, the first eyewitness, reports inland Britons who sow no corn,
    live on milk and flesh, dress in skins, dye themselves blue with woad,
    and hold wives in common. Tacitus weighs their origins from physical
    type — the ruddy-haired Caledonians suggesting German stock, the swarthy
    Silures Iberian. Strabo maps the island as a triangle parallel to the
    Gallic coast, roughly 4,300–4,400 stadia along its longest side.
    Cassius Dio, writing later, divides the Britons into two great races, the
    Caledonians and the Maeatians, who dwell coatless and shoeless in tents,
    hold their women in common, and rear their children as a community.
  gold_spans:
    - pg_id: 10657
      quote: >-
        Most of the inland inhabitants do not sow corn, but live on milk and
        flesh, and are clad with skins. All the Britons, indeed, dye
        themselves with wood, which occasions a bluish colour, and thereby
        have a more terrible appearance in fight.
      note: Caesar, BG V.14 ("wood" = woad in this translation)
    - pg_id: 7524
      quote: >-
        Who were the first inhabitants of Britain, whether indigenous [44] or
        immigrants, is a question involved in the obscurity usual among
        barbarians. Their temperament of body is various, whence deductions
        are formed of their different origin. Thus, the ruddy hair and large
        limbs of the Caledonians [45] point out a German derivation.
      note: Tacitus, Agricola 11 (bracketed numbers are footnote markers)
    - pg_id: 44884
      quote: >-
        Britain is triangular in form; its longest side lies parallel to
        Keltica, in length neither exceeding nor falling short of it; for each
        of them extends as much as 4300 or 4400 stadia
      note: Strabo IV.5
    - pg_id: 10890
      quote: >-
        They dwell coatless and shoeless in tents, possess their women in
        common, and rear all the offspring as a community.
      note: Cassius Dio LXXVII (Severus in Britain) — Caledonians and Maeatians
  status: draft

- id: cb-006
  category: cross-book
  question: How is Cleopatra's death reported across the sources?
  ideal_answer: >-
    All three sources report the famous asp while admitting uncertainty.
    Plutarch describes her found dead in royal ornaments on a golden bed,
    Iras dying at her feet and Charmion adjusting her diadem — but says "what
    really took place is known to no one," weighing the asp in the figs
    against poison in a hollow bodkin. Dio likewise: "no one knows clearly in
    what manner she perished," only slight indentations on her arm.
    Suetonius adds that Augustus, wanting her alive for his triumph, sent the
    Psylli snake-charmers to suck out the poison.
  gold_spans:
    - pg_id: 674
      quote: >-
        on opening the doors, they saw her stone-dead, lying upon a bed of
        gold, set out in all her royal ornaments. Iras, one of her women, lay
        dying at her feet, and Charmion, just ready to fall, scarce able to
        hold up her head, was adjusting her mistress's diadem.
      note: Plutarch, Antony — the death scene
    - pg_id: 674
      quote: >-
        But what really took place is known to no one. Since it was also said
        that she carried poison in a hollow bodkin, about which she wound her
        hair; yet there was not so much as a spot found, or any symptom of
