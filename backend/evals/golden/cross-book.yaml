    Rome on the eastern frontier. Cassius Dio records its alarming birth —
    "Artaxerxes, a Persian, having conquered the Parthians in three battles and
    killed their king," then menaced the Roman provinces of Mesopotamia.
    Rawlinson's Sassanian volume traces the long struggle over the frontier
    fortresses, noting how Sapor "rightly conceived from the first the importance
    of Nisibis." Ammianus, the eyewitness of Julian's invasion, shows the
    Persians' method against the retreating Romans — having "learnt by their
    frequent defeats to shun pitched battles," they "laid secret ambuscades on
    our road."
