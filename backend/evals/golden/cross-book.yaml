- id: cb-028
  category: cross-book
  question: What do the sources reveal about Roman dining, banquets, and table luxury?
  ideal_answer: >-
    The sources show both the ordinary custom and its imperial excess. Fowler
    describes the shape of the Roman day around its chief meal — "the dinner,
    cena, was in fact the principal private event of the day," coming when all
    business was over. Suetonius supplies the extreme of imperial gluttony, the
    emperor Vitellius who "always made three meals a day, sometimes four:
    breakfast, dinner, and supper, and a drunken revel after all," sustained by
    habitual vomiting. Dill, the modern voice, weighs the moralists' charges,
    noting that "modern criticism has laboured hard to correct some of the
    harsher judgments on the luxury and self-indulgence of the period of the
    early Empire."
