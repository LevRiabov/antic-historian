    when Servius Galba was consul for the second time with Titus Vinius for his
    colleague" — the start of the convulsion that ran Galba to Otho to Vitellius
    to Vespasian. Plutarch's surviving lives carry the same rapid turnover: the
    senate, swearing in Otho's name the oath it had just sworn and broken to
    Galba, "conferred on him the titles of Caesar and Augustus." Suetonius'
    per-emperor lives record each fall in turn — Galba "perished in the
    seventy-third year of his age, and the seventh month of his reign," cut down
    in the Forum.
