- id: cb-015
  category: cross-book
  question: How do the sources assess the character and generalship of Hannibal?
  ideal_answer: >-
    The sources agree on his extraordinary gifts while dividing on his vices.
    Livy's introductory sketch grants him a genius equally fit to command and
    obey, fearless and tireless, "by far the first of the cavalry and infantry"
    — but balances it with "inhuman cruelty, more than Punic perfidy." Polybius
    marvels at the generalship that held a polyglot army together "for sixteen
    continuous years" in Italy. Appian preserves the famous conversation in
    which Scipio asked Hannibal whom he thought the greatest general, ranking
    himself only behind Alexander and Pyrrhus. Mommsen, the modern judge, notes
    that "the Romans charged him with cruelty, the Carthaginians with
    covetousness," yet finds the noble image of the commander unmarred.
  gold_spans:
