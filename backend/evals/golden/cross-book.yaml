    the river Euphrates, under the pretext and impetus of the Mithridatic war,
    under Roman sway." Plutarch follows the commanders: the people "unanimously
    voted [Lucullus] to the Mithridatic war," which Pompey later took over.
    Livy's epitome records the war's terrible opening — Mithridates seized Asia,
    chained the proconsul and the general, "and ordered all the Romans in Asia
    to be massacred on the same day."
