- id: cb-024
  category: cross-book
  question: How do the sources explain the fall of Nineveh and the end of the Assyrian empire?
  ideal_answer: >-
    The modern reconstruction and the ancient notice agree that Nineveh fell to
    a coalition led by the Medes. Rawlinson's Assyria judges that the empire
    "fell, not so much from any inherent weakness, or from the effect of gradual
    decay, as by an unfortunate combination of circumstances" — a barbarian
    inroad coinciding with the rise of a warlike neighbour. His Media traces that
    neighbour's role: after the siege "the fall of the city was followed by a
    division of the spoil between the two principal conquerors," Cyaxares the
    Mede taking Assyria proper. Herodotus gives the early Greek account — the
    Medes "had rule over the same nations as before; and they also took Nineveh"
    and made the Assyrians subject, except Babylon.
