- id: cb-020
  category: cross-book
  question: How do the sources tell the rise and fall of Theban supremacy under Epaminondas?
  ideal_answer: >-
    The sources trace Theban hegemony as the personal achievement of
    Epaminondas — and its collapse with his death. Xenophon, contemporary and
    cool toward Thebes, ends his history on the inconclusive note that after
    Mantinea "the effective result of these achievements was the very opposite of
    that which the world at large anticipated." Diodorus makes the dependence
    explicit: while Epaminondas lived "he gained the sovereign power for his
    country; but, by his death they lost it again" — "and this was the end of
    Epaminondas, a man honoured and esteemed of all." Pausanias records his
    monument, whose elegiac lines tell "how he restored Messene, and how the
    Greeks got their freedom through him." Plutarch supplies the Theban view of
    the bond with Pelopidas, for whom Epaminondas "singly fought a multitude,
    resolving rather to die than forsake his helpless" friend.
