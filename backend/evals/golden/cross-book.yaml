- id: cb-027
  category: cross-book
  question: How do the sources describe Rome's catastrophic defeat by the Parthians at Carrhae?
  ideal_answer: >-
    Plutarch's life of Crassus gives the fullest narrative of the disaster — the
    Romans, after the battle, had "a sad night of it," unable to bury their dead
    or tend their wounded, "everyone bewailed his own fate." Cassius Dio supplies
    the end at the parley: lured to a conference by Surena, Crassus "fell among
    the rest, whether he was slain by one of his own men to prevent his capture
    alive, or whether by the enemy." Rawlinson's Parthia explains the military
    cause from the victors' side — to attack a cavalry power "with a body of
    foot-soldiers, supported by an insignificant number of horse, must be at all
    times rash and dangerous."
