- id: cb-025
  category: cross-book
  question: What do the sources say about the walls, size, and wonders of Babylon?
  ideal_answer: >-
    The sources concur on Babylon's vast scale. Rawlinson's modern survey calls
    it "probably the largest and most magnificent city of the ancient world."
    Herodotus describes its plan — "there are two divisions of the city; for a
    river whose name is Euphrates parts it in the middle" — within its enormous
    square of wall. Strabo gives the measurements: the wall was 385 "stadia in
    circumference, and 32 feet in thickness," with towers rising to 60 cubits —
    the defenses that, with the hanging garden, made the city one of the wonders
    of the world.
