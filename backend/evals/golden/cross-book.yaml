- id: cb-018
  category: cross-book
  question: How do the sources treat the reforms and deaths of the Gracchi brothers?
  ideal_answer: >-
    Plutarch preserves the moral force of the cause in Tiberius Gracchus's
    speech on the landless soldiers of Italy, who though they fought for Rome
    had no "houses of their own, or hearths of their ancestors to defend."
    Appian narrates the legislative struggle, ending when a substitute tribune
    was chosen "and the agrarian law was enacted." Livy's epitome summarizes the
    reform itself — Gracchus's agrarian law that "no person should hold more than
    five hundred acres of the public lands" — and the violence its passage
    unleashed.
