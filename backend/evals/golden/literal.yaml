- id: lit-012
  category: literal
  question: How many Jews perished and how many were taken captive during the whole siege of Jerusalem in the Jewish War?
  ideal_answer: >-
    Josephus reports that the number carried captive during the whole war was
    ninety-seven thousand, and the number who perished during the whole siege
    was eleven hundred thousand (1,100,000) — most of them Jews who had come up
    from the country to Jerusalem for the feast of unleavened bread and were
    then shut in by the Roman army, destroyed by pestilence and famine.
  gold_spans:
    - pg_id: 2850
      quote: >-
        Now the number 32 of those that were carried captive during this whole
        war was collected to be ninety-seven thousand; as was the number of
        those that perished during the whole siege eleven hundred thousand
      note: >-
        Josephus, Wars VI.9.3 ("32" is a footnote marker in the canonical text,
        as with "94" in lit-005). The precise figures are unique to Josephus.
  status: reviewed

- id: lit-013
  category: literal
  question: What did Eleazar urge the defenders of Masada to do rather than fall into Roman hands?
  ideal_answer: >-
    Eleazar urged the defenders to die free by their own hands rather than be
    taken — to slay their own wives and children and then one another, having
    first burned their possessions and the fortress, so as to preserve their
    freedom and deny the Romans the pleasure of capturing them. They carried
    out the mass suicide, sparing only their stores of food.
  gold_spans:
    - pg_id: 2850
      quote: >-
        Let our wives die before they are abused, and our children before they
        have tasted of slavery; and after we have slain them, let us bestow
        that glorious benefit upon one another mutually, and preserve ourselves
        in freedom
      note: Josephus, Wars VII.8 — Eleazar's exhortation at Masada
  status: reviewed

- id: lit-014
  category: literal
  question: What act of a starving mother during the famine in Jerusalem does Josephus describe in the Wars of the Jews?
  ideal_answer: >-
    Josephus describes Mary of Bethezuba, a once-wealthy woman driven to
    madness by the famine, who killed her infant son, roasted him, ate one half
    and kept the other half concealed — an atrocity he says had no parallel in
    Greek or barbarian history.
  gold_spans:
    - pg_id: 2850
      quote: >-
        she slew her son, and then roasted him, and eat the one half of him,
        and kept the other half by her concealed
      note: Josephus, Wars VI.3 — Mary of Bethezuba
  status: reviewed

- id: lit-015
  category: literal
  question: By what act could a man become the priest of Diana's grove at Nemi, and what was the priest called?
  ideal_answer: >-
    A man could win the priesthood only by breaking off a bough of a certain
    sacred tree in the grove and then slaying the reigning priest in single
    combat; having killed him, he succeeded to the office and held it until he
    in turn was slain by a stronger or craftier challenger. The priest bore the
    title King of the Wood (Rex Nemorensis).
  gold_spans:
    - pg_id: 3623
      quote: >-
        Success in the attempt entitled him to fight the priest in single
        combat, and if he slew him he reigned in his stead with the title of
        King of the Wood
      note: Frazer, The Golden Bough, ch. I (The King of the Wood)
  status: reviewed

- id: lit-016
  category: literal
  question: What was the supreme or national god of the Assyrians?
  ideal_answer: >-
    The supreme, distinctively national god of the Assyrians was Asshur — head
    of the Assyrian pantheon, styled "the great Lord" and "King of all the
    Gods," the tutelary deity of the kings and of the country, whose name was
    identical with that of Assyria itself.
  gold_spans:
    - pg_id: 16162
      quote: >-
        Asshur came to be viewed simply as a celestial being--the first and
        highest of all the divine agents who ruled over heaven and earth
      note: Rawlinson, Seven Great Monarchies, Vol. 2 (Assyria), ch. VIII (Religion)
  status: reviewed

- id: lit-017
  category: literal
  question: What was the principal building material of Chaldaea, and why was stone so little used?
  ideal_answer: >-
    The principal building material of Chaldaea was brick, made from the
    abundant clay of the alluvial plain (sun-dried, or kiln-baked for greater
    hardness). Stone was scarcely used because the alluvium was destitute of
    it — any stone had to be imported from adjacent countries — so the
    Chaldaeans built with clay brick in its default.
  gold_spans:
    - pg_id: 16161
      quote: >-
        The Chaldaeans found, in default of stone, a very tolerable material in
        their own country; which produced an inexhaustible supply of excellent
        clay, easily moulded into bricks
      note: Rawlinson, Seven Great Monarchies, Vol. 1 (Chaldaea) — mineral products
  status: reviewed

- id: lit-018
