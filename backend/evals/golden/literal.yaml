# Golden set — LITERAL: the answer sits verbatim in one passage of one work.
# Tests basic vector retrieval. Format spec + workflow: docs/golden-set.md
# Validate with: uv run ahx eval validate
#
# lit-001 is a WORKED EXAMPLE (verified to resolve) — keep, copy, extend.
#
# Spans here are ALTERNATIVES: the same fact recurs across works, so all spans
# of a question share one `groups` label — retrieving any one fully answers
# (recall is per requirement group, not per span; see docs/golden-set.md §4a).

- id: lit-001
  category: literal
  question: How many wounds did Julius Caesar receive when he was assassinated?
  ideal_answer: >-
    According to Suetonius, Caesar was stabbed with twenty-three wounds. He
    uttered a groan at the first wound but no cry, though some report that he
    said "And you too, my son?" to Marcus Brutus.
  gold_spans:
    - pg_id: 6400
      groups: [wounds]
      quote: >-
        He was stabbed with three and twenty wounds, uttering a groan only,
        but no cry, at the first wound
      note: Suetonius, Julius LXXXII
    - pg_id: 900004
      groups: [wounds]
      quote: >-
        They continued their attack after he had fallen until he had received
        twenty-three wounds.
      note: Appian, Civil Wars II.117 — independent narrative of the killing
    - pg_id: 674
      groups: [wounds]
      quote: >-
        he received three and twenty. And the conspirators themselves were
        many of them wounded by each other
      note: Plutarch, Caesar 66 — independent account
    - pg_id: 44318
      groups: [wounds]
      quote: >-
        He was slain in Pompey’s senate-house with three-and-twenty wounds
      note: Livy, Periochae (Epitome of Book CXVI)
    - pg_id: 19694
      groups: [wounds]
      quote: >-
        he drew his toga over his head, and fell pierced with three-and-twenty
        wounds
      note: Smith, Smaller History of Rome — independent retelling
  notes: >-
    Worked example for the authoring format. The wound-count (twenty-three)
    recurs across many works in the corpus; all are valid retrieval targets.
  status: reviewed

- id: lit-002
  category: literal
  question: According to Herodotus, what did Egyptian households do when a cat died a natural death?
  ideal_answer: >-
    According to Herodotus, everyone living in a house where a cat died a
    natural death shaved their eyebrows — only their eyebrows, whereas when a
    dog died they shaved their whole body and head.
  gold_spans:
    - pg_id: 2131
      groups: [cat-mourning]
      quote: >-
        in whatever houses a cat has died by a natural death, all those who
        dwell in this house shave their eyebrows only, but those in which a
        dog has died shave their whole body and also their head
      note: Herodotus II.66 (An Account of Egypt)
    - pg_id: 2707
      groups: [cat-mourning]
      quote: >-
        in whatever houses a cat has died by a natural death, all those who
        dwell in this house shave their eyebrows only, but those in whose
        houses a dog has died shave their whole body and also their head
      note: Herodotus II.66 (History Vol. I) — same account, different edition
  status: reviewed

- id: lit-003
  category: literal
  question: What period of history did Gibbon declare the happiest and most prosperous for the human race?
  ideal_answer: >-
    Gibbon wrote that if asked to fix the period during which the condition of
    the human race was most happy and prosperous, one would without hesitation
    name the span from the death of Domitian to the accession of Commodus —
    the era of Nerva, Trajan, Hadrian, and the Antonines.
  gold_spans:
    - pg_id: 25717
      quote: >-
        If a man were called to fix the period in the history of the world,
        during which the condition of the human race was most happy and
        prosperous, he would, without hesitation, name that which elapsed from
        the death of Domitian to the accession of Commodus.
      note: Gibbon, Decline and Fall, ch. III
  status: reviewed

- id: lit-004
  category: literal
  question: According to Tacitus, what did the Germans consider the greatest disgrace in battle?
  ideal_answer: >-
    Tacitus says the greatest disgrace that could befall a German warrior was
    to have abandoned his shield. He adds that for a chief's companions it was
    lifelong reproach and infamy to retreat from the field surviving their
    chief.
  gold_spans:
    - pg_id: 7524
      groups: [disgrace]
      quote: >-
        The greatest disgrace that can befall them is to have abandoned their
        shields.
      note: Tacitus, Germania 6
    - pg_id: 7524
      groups: [disgrace]
      quote: >-
        In the field of battle, it is disgraceful for the chief to be
        surpassed in valor; it is disgraceful for the companions not to equal
        their chief; but it is reproach and infamy during a whole succeeding
        life to retreat from the field surviving him.
      note: Tacitus, Germania 14
  notes: >-
    Two famous disgrace passages — a good answer may cite either or both, so
    both are gold (alternatives, one requirement).
  status: reviewed

- id: lit-005
  category: literal
  question: Whom did the Athenians send as a runner to Sparta before the battle of Marathon, and what happened to him on the way?
  ideal_answer: >-
    The Athenian generals sent Pheidippides, a professional long-distance
    runner, as herald to Sparta. On the way, by Mount Parthenion above Tegea,
    the god Pan met him, called him by name, and bade him ask the Athenians
    why they paid him no honor although he was well disposed to them and had
    often been — and would again be — serviceable.
  gold_spans:
    - pg_id: 2456
      groups: [pheidippides]
      quote: >-
        the generals sent off to Sparta a herald, namely Pheidippides 94 an
        Athenian and for the rest a runner of long day-courses and one who
        practised this as his profession. With this man, as Pheidippides
        himself said and as he made report to the Athenians, Pan chanced to
        meet by mount Parthenion, which is above Tegea; and calling aloud the
        name of Pheidippides, Pan bade him report to the Athenians and ask for
        what reason they had no care of him, though he was well disposed to
        the Athenians and had been serviceable to them on many occasions
        before that time, and would be so also yet again.
      note: Herodotus VI.105 ("94" is a footnote marker in the canonical text)
    - pg_id: 60426
      groups: [pheidippides]
      quote: >-
        The god Pan had met the courier Pheidippidês on his hasty route from
        Athens to Sparta, and had told him that he was much hurt that the
        Athenians had as yet neglected to worship him
      note: Grote vol. IV — retells the full episode; equally valid retrieval target
    - pg_id: 68946
      groups: [pheidippides]
      quote: >-
        But he said that he had met with Pan near the Parthenian forest, and
        he had said that he was friendly to the Athenians, and would come and
        help them at Marathon
      note: Pausanias I.28 — Philippides sent to Sparta, met Pan on the way
    - pg_id: 900006
      groups: [pheidippides]
      quote: >-
        The fast runner Philippides, speeding through Arcadia on his way to
        seek Spartan help, had been accosted by Pan himself
      note: Bury, History of Greece — retells the courier-and-Pan episode
  notes: >-
    Grote vol. IV also retells the journey itself (150 miles in 48 hours) in a
    separate passage without the Pan encounter — not gold (answers only half
    the question).
  status: reviewed

- id: lit-006
  category: literal
  question: What epitaph was inscribed for the Spartans who fell at Thermopylae?
  ideal_answer: >-
    The inscription for the Spartans read (in Macaulay's translation):
    "Stranger, report this word, we pray, to the Spartans, that lying here in
    this spot we remain, faithfully keeping their laws."
