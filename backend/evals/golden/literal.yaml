  question: How many men were appointed to draw up the laws at Athens and became known as the Thirty?
  ideal_answer: >-
    Thirty men were chosen — the body that became known as the Thirty (later
    the Thirty Tyrants) — appointed to draft a constitution based on the
    ancestral laws of Athens, though they never published the laws and instead
    seized power for themselves.
  gold_spans:
    - pg_id: 1174
      quote: >-
        the people passed a resolution to choose thirty men who were to draft a
        constitution based on the ancestral laws of the State
      note: Xenophon, Hellenica II.3
  status: reviewed

- id: lit-019
  category: literal
  question: What did Maharbal say to Hannibal after the battle of Cannae?
  ideal_answer: >-
    When Hannibal hesitated to march at once on Rome after Cannae, his cavalry
    commander Maharbal — who had urged that within five days Hannibal might dine
    in the Capitol — rebuked him: "You know how to conquer, Hannibal, but you do
    not know how to make use of your victory." Livy adds that this day's delay
    is believed to have saved the city and the empire.
  gold_spans:
    - pg_id: 10907
      quote: "You know how to conquer, Hannibal; but you do not know how to make use of your victory."
      note: Livy, History of Rome XXII.51
  status: reviewed

- id: lit-020
  category: literal
  question: What trophy of gold rings was poured out before the Carthaginian senate to show the scale of the victory at Cannae?
  ideal_answer: >-
    To prove the scale of the victory, Mago had the gold rings stripped from
    the Roman knights slain at Cannae poured out in the vestibule of the
    Carthaginian senate-house — a heap that, by report, filled about a peck
    (some claimed three and a half pecks) — explaining that only knights, and
    of these the principal only, wore such rings.
  gold_spans:
    - pg_id: 10907
      quote: >-
        he ordered the golden rings to be poured out in the vestibule of the
        senate-house, of which there was such a heap that some have taken upon
        themselves to say that on being measured they filled three pecks and a
        half
      note: Livy, History of Rome XXIII.12
  status: reviewed

- id: lit-021
  category: literal
  question: What did Scipio Africanus say to the crowd on the anniversary of his victory when prosecuted, before leading them to the Capitol?
  ideal_answer: >-
    Brought to trial on the very anniversary of the battle, Scipio reminded the
    assembly that on that day he had fought and beaten Hannibal and the
    Carthaginians in Africa (at Zama); declaring it unfit to spend such a day in
    litigation, he went up to the Capitol to thank the gods — and the whole
    assembly left the tribunes and followed him.
  gold_spans:
    - pg_id: 44318
      quote: >-
        on the anniversary of this day I fought a pitched battle in Africa,
        with Hannibal and the Carthaginians, with good fortune and success
      note: Livy, History of Rome XXXVIII.51
  status: reviewed

- id: lit-022
  category: literal
  question: Which famous maxims of the sages were inscribed in the forecourt of the temple of Apollo at Delphi?
  ideal_answer: >-
    The two famous maxims inscribed by the Seven Wise Men in the vestibule
    (forecourt) of the temple of Apollo at Delphi were "Know thyself" and
    "Nothing in excess" — the latter rendered by Pausanias as "Not too much of
    anything."
  gold_spans:
    - pg_id: 68680
      quote: >-
        offered to Apollo those famous sayings, _Know thyself_ and _Not too much
        of anything_. And they inscribed those sayings in the vestibule of the
        temple
      note: >-
        Pausanias X.24 (underscores are italics markers in the canonical text).
        The clean "inscribed in the vestibule" attestation is unique to
        Pausanias in the corpus.
  status: reviewed

- id: lit-023
  category: literal
  question: How did a Roman patron's clients begin his day, in the morning ceremony at his house?
  ideal_answer: >-
    A patron's clients began his day with the salutatio — the morning
    reception. In the early hours after daybreak, clients and callers gathered
    at his house to greet him and pay their respects before he went down to the
    Forum, often escorting him there in a train; under the Empire they thronged
    the reception hoping for an invitation to dinner or a dole (the sportula).
  gold_spans:
    - pg_id: 11256
      groups: [salutatio]
      quote: >-
        As a rule it was during the first two hours (_mane_) that callers
        collected. In the old times it had been the custom to open your house
        and begin your business at daybreak, and after saluting your familia
        and asking a blessing of the household gods, to attend to your own
        affairs and those of your clients.
      note: Fowler, Social Life at Rome in the Age of Cicero — the Republican morning reception
    - pg_id: 34122
      groups: [salutatio]
      quote: >-
        the many private patrons whose morning receptions were thronged by a
        hungry crowd, eager for an invitation to dinner, or its equivalent in
        the sportula
      note: Dill, Roman Society from Nero to Marcus Aurelius — the Imperial salutatio
  notes: >-
    Two attestations of the morning reception (salutatio) — Fowler for the
    Republic, Dill for the Empire — are alternatives; either fully answers.
  status: reviewed
