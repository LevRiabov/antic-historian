- id: lit-008
  category: literal
  question: What honor did Caligula plan to give his horse Incitatus?
  ideal_answer: >-
    Suetonius reports it was said Caligula intended to make his horse
    Incitatus consul. He had already given the horse a marble stable, an ivory
    manger, purple housings, a jewelled frontlet, and a house with slaves and
    furniture for entertaining guests invited in the horse's name.
  gold_spans:
    - pg_id: 6400
      groups: [incitatus]
      quote: >-
        For this favourite animal, besides a marble stable, an ivory manger,
        purple housings, and a jewelled frontlet, he appointed a house, with a
        retinue of slaves, and fine furniture, for the reception of such as
        were invited in the horse’s name to sup with him. It is even said that
        he intended to make him consul.
      note: Suetonius, Caligula LV
    - pg_id: 10883
      groups: [incitatus]
      quote: >-
        One of the horses, that he named Incitatus, he invited to dinner,
        offered him golden barley, and drank his health in wine from gold
        goblets. He took oaths by the same beast's Guardian Spirit and
        Presiding Fortune and promised besides that he would appoint him
        consul.
      note: Cassius Dio LIX.14 — independent account, same fact
  status: reviewed

- id: lit-009
  category: literal
  question: How does Caesar describe the division of Gaul at the start of his commentaries?
  ideal_answer: >-
    Caesar opens by stating that all Gaul is divided into three parts, one
    inhabited by the Belgae, another by the Aquitani, and the third by the
    people called Celts in their own language and Gauls in Latin — all
    differing from each other in language, customs, and laws.
  gold_spans:
    - pg_id: 10657
      quote: >-
        All Gaul is divided into three parts, one of which the Belgae inhabit,
        the Aquitani another, those who in their own language are called
        Celts, in ours Gauls, the third. All these differ from each other in
        language, customs and laws.
      note: Caesar, De Bello Gallico I.1
  status: reviewed

