  question: What answer did the Delphic oracle give Croesus when he asked whether to attack Persia?
  ideal_answer: >-
    The oracles answered that if Croesus marched against the Persians he would
    destroy a great empire, and counselled him to find the most powerful of
    the Hellenes and make them his friends. The prophecy was ambiguous — the
    great empire he destroyed turned out to be his own.
  gold_spans:
    - pg_id: 2707
      quote: >-
        the answers of both the Oracles agreed in one, declaring to Croesus
        that if he should march against the Persians he should destroy a great
        empire: and they counselled him to find out the most powerful of the
        Hellenes and join these with himself as friends.
      note: Herodotus I.53
    - pg_id: 2707
      quote: >-
        Loxias told him beforehand that if he should march upon the Persians
        he should destroy a great empire
      note: Herodotus I.91 — the Pythia's own recap of the same prophecy
