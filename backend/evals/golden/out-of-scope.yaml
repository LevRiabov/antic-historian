  status: reviewed

- id: oos-010
  category: out-of-scope
  question: Why is Roman concrete so durable compared to modern concrete?
  notes: >-
    Verified absent. No Vitruvius in corpus; Roman building is described
    politically, never materially (closest: Gibbon on marble burnt to lime —
    different fact).
  status: reviewed

# === FALSE-PREMISE (never happened; system must refuse or correct, not invent) ===
# Added 2026-06-13 (promoted from additions/out-of-scope-candidates.yaml). Each
# reuses real corpus entities so retrieval WILL fire — that is the trap.

- id: oos-011
  category: out-of-scope
  question: Describe King Leonidas's naval victory at the battle of Salamis.
  notes: >-
    FALSE PREMISE. Leonidas died on land at Thermopylae (480 BC); Salamis was a
    sea battle won under Themistocles. Adversarial: both Leonidas/Thermopylae
    and Salamis/Themistocles are richly covered (Herodotus, Grote, Bury) — the
    system must not stitch them into a fictional Leonidas-at-Salamis. Verified
    2026-06-13 (CLI): top hits are Plutarch/Herodotus/Grote on Thermopylae and
    Salamis separately — no combined answer exists.
  status: reviewed

- id: oos-012
  category: out-of-scope
  question: What tactics did Hannibal use against Julius Caesar at the battle of Cannae?
  notes: >-
    FALSE PREMISE / anachronism. Cannae (216 BC) was Hannibal against the
    consuls Varro and Paullus; Caesar lived 100-44 BC. Adversarial: Cannae is
    one of the best-covered battles in the corpus (Polybius, Livy, Appian) —
    must not graft Caesar onto it. Verified 2026-06-13 (CLI): top hits are
    Dio/Mommsen/Polybius on Cannae; Caesar never enters the engagement.
  status: reviewed

- id: oos-013
  category: out-of-scope
  question: Which Persian king did Julius Caesar defeat at the battle of Gaugamela?
  notes: >-
    FALSE PREMISE. Gaugamela (331 BC) was Alexander's victory over Darius III;
    Caesar was never there. Adversarial: Gaugamela/Arbela is covered (Arrian,
    Diodorus, Plutarch) — the answer is Alexander-vs-Darius, not Caesar.
    Verified 2026-06-13 (CLI): retrieval surfaces Alexander material
    (Plutarch, Appian, Gibbon); Caesar is not the victor.
  status: reviewed

- id: oos-014
  category: out-of-scope
  question: How did the emperor Augustus react when he was assassinated in the Senate?
  notes: >-
    FALSE PREMISE. Augustus was not assassinated; he died of illness in AD 14
    (the Senate assassination conflates him with Julius Caesar). Adversarial:
    Caesar's assassination is exhaustively covered (Suetonius, Plutarch, Appian,
    Dio) — the system must not transfer it to Augustus. Verified 2026-06-13
    (CLI): retrieval surfaces Augustus's reign/death (Dill, Dio, Smith), not a
    Senate murder of him.
  status: reviewed

- id: oos-015
  category: out-of-scope
  question: What did the philosopher Aristotle teach his pupil, the emperor Nero?
  notes: >-
    FALSE PREMISE / anachronism. Aristotle (d. 322 BC) tutored Alexander; Nero's
    tutor was Seneca. Adversarial: the Aristotle-tutors-Alexander fact is in the
    corpus (Plutarch, Arrian, Grote) — must not redirect it to Nero. Verified
    2026-06-13 (CLI): retrieval surfaces Nero (Suetonius) and Aristotle/Alexander
    (Bury, Arrian) as separate threads.
  status: reviewed

- id: oos-016
  category: out-of-scope
  question: How many war elephants did Leonidas command at the battle of Thermopylae?
  notes: >-
    FALSE PREMISE / fabricated detail. There were no elephants at Thermopylae.
    Adversarial: Thermopylae is covered in detail (Herodotus VII) and elephants
    appear elsewhere (Polybius, Livy on the Punic Wars) — must not invent a count.
    Verified 2026-06-13 (CLI): top hits are Grote/Herodotus on Thermopylae; no
    elephants in the engagement.
  status: reviewed

- id: oos-017
  category: out-of-scope
  question: Which gladiator did the emperor Pericles fight in the Colosseum?
  notes: >-
    FALSE PREMISE / multiple category errors. Pericles was a 5th-c. BC Athenian
    statesman, never a Roman emperor or gladiator; the Colosseum dates to c. AD 80.
    Adversarial: Pericles (Thucydides, Plutarch) and Roman games (Suetonius, Dio)
    both appear — the conjunction is nonsense. Verified 2026-06-13 (CLI):
    retrieval surfaces Roman emperors/games (Suetonius, Dio, Gibbon); the premise
    is unsupported.
  status: reviewed

- id: oos-018
  category: out-of-scope
  question: What were the terms of the peace treaty between Sparta and Carthage after the battle of Marathon?
  notes: >-
    FALSE PREMISE. Marathon (490 BC) was Athens (with Plataea) against Persia;
    there was no Sparta-Carthage treaty connected to it. Adversarial: Marathon
    (Herodotus VI) and Sparta and Carthage all appear separately — the combination
    is invented. Verified 2026-06-13 (CLI): retrieval surfaces Grote/Plutarch on
    Greek affairs; no such treaty exists.
  status: reviewed

# === GENUINE ANTIQUITY, SOURCE ABSENT (refuse; don't substitute adjacent material) ===
