# Golden set — OUT-OF-SCOPE: questions the corpus CANNOT answer. The correct
# behavior is an explicit refusal. No ideal_answer, no gold_spans.
# Good OOS questions are adjacent-but-absent: medieval/modern history, or
# antiquity details genuinely not covered by these 38 works.

- id: oos-001
  category: out-of-scope
  question: What did Napoleon do at the Battle of Austerlitz?
  notes: Worked example. Deliberately far from the corpus.
  status: reviewed

- id: oos-002
  category: out-of-scope
  question: What does the Bayeux Tapestry depict about the Norman conquest?
  notes: Medieval — adjacent discipline, absent from corpus.
  status: reviewed

- id: oos-003
  category: out-of-scope
  question: What does the Code of Hammurabi say about punishments for theft?
  notes: >-
    Verified absent (2026-06-11). Adversarial: retrieval surfaces Solon's
    theft laws (Grote III) and the Twelve Tables (Gibbon) — system must not
    substitute them.
  status: reviewed

- id: oos-004
  category: out-of-scope
  question: What does the Epic of Gilgamesh say about the great flood?
  notes: >-
    Verified absent. Babylon's customs are richly covered (Herodotus I), but
    cuneiform literature was undeciphered until the 19th century.
  status: reviewed

- id: oos-005
  category: out-of-scope
  question: What is written on the Rosetta Stone?
  notes: >-
    Verified absent. Egypt-adjacent — Herodotus' Egypt is in corpus, the
