- id: oos-019
  category: out-of-scope
  question: What does Plato's Republic propose for the ideal state and its philosopher-kings?
  notes: >-
    Genuine antiquity, source absent. No Plato in the corpus. Adversarial:
    constitutional theory is present (Polybius VI on the cycle of constitutions;
    Spartan/Athenian government across Herodotus, Thucydides, Grote) — the system
    must not pass that off as Plato's Republic. Verified 2026-06-13 (CLI):
    retrieval surfaces Bury's "ideal state" and Grote/Plutarch discussing Plato
    as a figure — but no text of the Republic.
  status: reviewed

- id: oos-020
  category: out-of-scope
  question: How does Homer's Iliad narrate the duel between Achilles and Hector?
  notes: >-
    Genuine antiquity, source absent. Homer's poems are not corpus texts.
    Adversarial: Grote and Bury discuss the Trojan legend and the Homeric
    question at length — they analyze the legend, they do not contain the Iliad's
    narrative of the duel. Verified 2026-06-13 (CLI): top hits are Grote
    "Grecian Epic / Legend of Troy" — analysis of the legend, not the poem.
  status: reviewed

