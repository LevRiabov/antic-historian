  question: What Greek coastal city was swallowed by the sea after an earthquake, leaving its ruins visible beneath the water?
  ideal_answer: >-
    Helike, in Achaea. One winter night (373 BC) a violent earthquake struck and
    the sea simultaneously rushed in, submerging the city and its people; for a
    long time afterwards its ruins could be seen under the water, growing fainter
    as the sea wore them away.
