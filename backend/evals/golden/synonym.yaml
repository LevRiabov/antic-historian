- id: syn-021
  category: synonym
  question: What great temple on the Capitol was burned down during the street fighting in Rome in the civil war of AD 69?
  ideal_answer: >-
    The temple of Jupiter Optimus Maximus (the Capitol) was burned to the ground
    during the fighting between the Vitellians and the supporters of Vespasian.
    Tacitus calls it the most deplorable disgrace to befall Rome since the city's
    foundation — the seat of Jupiter, untouched by Porsenna or the Gauls, openly
    besieged and set on fire.
  gold_spans:
    - pg_id: 900002
      quote: >-
        And so the Capitol, with its gates shut, neither defended by friends, nor
        spoiled by a foe, was burnt to the ground.
      note: Tacitus, Histories III — "set on fire"/"burnt to the ground", not "arson"
  notes: >-
    Vocab gap — modern "burned down/arson" vs set on fire/conflagration. Single
    span — the AD 69 burning is Tacitus's set-piece; fills the ZERO-coverage
    Tacitus Histories (#900002). (Appian #900004's "the Capitol was burned" is the
    83 BC Sullan fire — a different event — so not a span here.)
  status: reviewed

- id: syn-022
  category: synonym
  question: How did the soldiers turn against the emperor Galba and kill him in the forum?
  ideal_answer: >-
    Bought over by Otho's promises, the praetorians abandoned Galba; as he was
    carried into the Forum his bearers panicked and tipped him from his litter
    near the Lacus Curtius, where the soldiers cut him down — most reports saying
    a legionary named Camurius severed his throat — and then beheaded and
    mutilated the old emperor, consul and high priest, before the senators and
    crowd.
  gold_spans:
    - pg_id: 900002
      groups: [galba-death]
      quote: >-
        it is the current report that one Camurius, a soldier of the 15th legion,
        completely severed his throat by treading his sword down upon it.
      note: Tacitus, Histories I — "slew"/"severed his throat", not "coup/assassinate"
    - pg_id: 10890
      groups: [galba-death]
      quote: >-
        cut down in the presence of many senators and crowds of plebeians the old
        man, their consul, high priest, Caesar, emperor
      note: Cassius Dio LXIV — independent account of the murder in the Forum
    - pg_id: 674
      groups: [galba-death]
      quote: >-
        Galba's chair was upset at the spot called the Lacus Curtius, where they
        ran up and struck at him as he lay in his corslet.
      note: Plutarch, Galba — the death scene at the Lacus Curtius
  notes: >-
    Vocab gap — modern "coup/assassinate" vs slew/struck/murdered. Fills the
    ZERO-coverage Tacitus Histories (#900002).
  status: reviewed

- id: syn-023
  category: synonym
  question: On what furniture did well-to-do Romans recline while eating the main meal of the day?
  ideal_answer: >-
    They reclined on couches (lecti) rather than sitting. The cena (dinner) was
    the chief meal of the day, and after the Punic wars special dining rooms — the
    triclinia, named for the three couches arranged around the table — were built
    for the comfort of reclining guests, with no more than three to a couch as
    good manners.
  gold_spans:
    - pg_id: 11256
      groups: [couches]
      quote: >-
        In the old days of household simplicity the meals were taken in the
        atrium, the husband reclining on a _lectus_
      note: Fowler, Social Life at Rome — names the couch (lectus); "dinner-party seating" is modern
    - pg_id: 11256
      groups: [couches]
      quote: >-
        These _triclinia_ were so arranged as to afford the greatest personal
        comfort and the best opportunities for conversation
      note: Fowler — the triclinium (three-couch dining room) for reclining guests
  notes: >-
    Vocab gap — modern "dinner-party seating/furniture" vs couches/lectus/
    triclinium/reclining. Fills the ZERO-coverage Fowler (#11256). Both spans are
    within the one target work (alternatives).
  status: reviewed
