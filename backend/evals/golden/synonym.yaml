- id: syn-011
  category: synonym
  question: What celibate Jewish brotherhood that held all property in common and despised private wealth is described at length?
  ideal_answer: >-
    The Essenes. Josephus devotes long passages to this Jewish sect: they reject
    pleasure, neglect marriage, hold riches in contempt, and own nothing
    privately — by their law all property is thrown into a common stock, "so
    that a rich man enjoys no more of his own wealth than he who hath nothing at
    all," with about four thousand living this way.
  gold_spans:
    - pg_id: 2850
      groups: [essenes]
      quote: >-
        These men are despisers of riches, and so very communicative as raises
        our admiration. Nor is there any one to be found among them who hath
        more than another; for it is a law among them, that those who come to
        them must let what they have be common to the whole order
      note: Josephus, Wars II.8 — text says "Essens"/"order", never "commune"/"celibate"
    - pg_id: 2848
      groups: [essenes]
      quote: >-
        This is demonstrated by that institution of theirs, which will not
        suffer any thing to hinder them from having all things in common; so
        that a rich man enjoys no more of his own wealth than he who hath
        nothing at all. There are about four thousand men that live in this way,
        and neither marry wives
      note: Josephus, Antiquities XVIII — independent retelling (common property + celibacy)
    - pg_id: 25717
      groups: [essenes]
      quote: >-
        a solitary people, who dwelt among the palm-trees near the Dead Sea; who
        subsisted without money, who were propagated without women
      note: Gibbon (Pliny via Decline & Fall) — scholarship retelling of the same sect
  notes: >-
    Vocab gap — question's "celibate/commune/brotherhood/private wealth" never
    appears; the texts say Essens/order/common. Fills the two ZERO-coverage
    Josephus volumes (Wars #2850, Antiquities #2848).
  status: reviewed

- id: syn-012
  category: synonym
  question: What stepped, multi-tiered temple-tower did the Babylonians raise at the center of their cities?
  ideal_answer: >-
    The ziggurat — a solid temple-tower built in receding stages (square set
    upon square), the most essential feature of a Babylonian temple, with a
    shrine at its summit. The number of stages ranged from two up to seven or
    eight; the great temple of Belus at Babylon was the famous example.
  gold_spans:
    - pg_id: 16164
      groups: [temple-tower]
      quote: >-
        Its most essential feature was a _ziggurat_, or tower, which was either
        square, or at any rate rectangular, and built in stages, the smallest
        number of such stages being two, and the largest known number seven.
      note: Rawlinson, Seven Great Monarchies IV (Babylon) — the canonical description
    - pg_id: 2707
      groups: [temple-tower]
      quote: >-
        and on this tower another tower has been erected, and another again upon
        this, and so on up to the number of eight towers
      note: >-
        Herodotus I.181 — the temple of Belus, "tower upon tower"; the pure
        vocab-gap span ("ziggurat" never appears)
  notes: >-
    Modern "ziggurat" vs archaic "temple-tower"/"tower in stages". NOTE the
    Rawlinson span itself uses the word "ziggurat", so the vocab gap is carried
    mainly by the Herodotus alternative. Fills Rawlinson Babylon (#16164).
  status: reviewed

- id: syn-013
  category: synonym
  question: What surprise attack on the beached Athenian fleet brought the long war between Athens and Sparta to an end?
  ideal_answer: >-
    The battle of Aegospotami (405 BC). With the Athenian crews scattered ashore
    in search of food, Lysander rowed across the Hellespont and caught the fleet
    drawn up on the open beach; all but a handful of ships (Conon escaped with
    nine) were taken without a fight. The loss of the fleet left Athens unable to
    continue the Peloponnesian War, and she surrendered the next year.
  gold_spans:
    - pg_id: 1174
      groups: [aegospotami]
      quote: >-
        every one of the remaining one hundred and seventy-one vessels were
        captured by Lysander on the beach
      note: Xenophon, Hellenica II.1 — the fleet taken at its moorings; "surprise attack" is modern
    - pg_id: 900006
      groups: [aegospotami]
      quote: >-
        Twenty ships, which were in a condition to fight, escaped; the remaining
        160 were captured at once.
      note: Bury, History of Greece — modern retelling ("There was no battle, no resistance")
    - pg_id: 52119
      groups: [aegospotami]
      quote: >-
        All the triremes were caught at their moorings ashore, some entirely
        deserted
      note: Grote vol. VIII — the surprise of the beached fleet
  notes: >-
    Vocab gap — "surprise attack/fleet" vs the texts' ships drawn up on shore
    with dispersed crews. Fills the ZERO-coverage Xenophon Hellenica (#1174).
  status: reviewed

- id: syn-014
  category: synonym
  question: How were the victorious Athenian commanders punished for failing to rescue survivors after the sea battle at Arginusae?
  ideal_answer: >-
    After winning at Arginusae (406 BC) the generals were accused of failing to
    pick up the shipwrecked crews (they blamed a storm). The Athenian assembly,
    illegally trying them collectively rather than one by one, condemned the
    eight; the six who had returned to Athens were executed. The city soon
    repented of the act.
  gold_spans:
    - pg_id: 1174
      groups: [arginusae-trial]
      quote: >-
        the eight generals were condemned, and the six who were in Athens were
        put to death
      note: Xenophon, Hellenica I.7 — "tried"/"put to death", not "court-martialled/executed"
    - pg_id: 900006
      groups: [arginusae-trial]
      quote: >-
        the eight generals who had been present at Arginusae were condemned to
        death and confiscation of property. Six, including Thrasyllus and
        Pericles, son of the great statesman, were executed
      note: Bury, History of Greece — independent retelling of the verdict
  notes: >-
    Vocab gap — modern "court-martialled/executed" vs the texts' tried/condemned/
    put to death. Fills Xenophon Hellenica (#1174).
  status: reviewed

- id: syn-015
  category: synonym
  question: How was a Roman army's overnight fortified camp laid out, with its regular streets and gates?
  ideal_answer: >-
    On a fixed, repeatable plan. The general's tent (praetorium) was set first,
    then the lines of the tribunes' and legions' quarters measured off from it;
    the whole camp formed a square crossed by regular streets (viae) "like a
    town", with four gates, a market-place, and a broad clear space inside the
    rampart — so familiar that each soldier could find his quarters as in his own
    city.
  gold_spans:
    - pg_id: 44125
      groups: [camp-layout]
      quote: >-
        The result of these arrangements is that the whole camp is a square,
        with streets and other constructions regularly planned like a town.
      note: Polybius VI (in Vol. I #44125) — the castrametation; text says "encampment"
    - pg_id: 2850
      groups: [camp-layout]
      quote: >-
        They divide the camp within into streets, very conveniently, and place
        the tents of the commanders in the middle
      note: Josephus, Wars III.5 — the Roman camp with its streets and four gates
    - pg_id: 25717
      groups: [camp-layout]
      quote: >-
        the streets were broad and perfectly straight, and a vacant space of two
        hundred feet was left on all sides between the tents and the rampart
      note: Gibbon, Decline & Fall — scholarship retelling of Roman castrametation
  notes: >-
    Vocab gap — modern "grid layout/standardized plan" vs the texts' encampment/
    streets/gates. COVERAGE CAVEAT — the candidate file targeted Polybius Vol. II
    (#44126) to fill its ZERO coverage, but Polybius's camp-layout description
    (Book VI) actually sits in Vol. I (#44125), already covered. This question
    therefore does NOT fill the #44126 gap; spans point to where the answer
    really lives (Polybius I + Josephus + Gibbon).
  status: reviewed

- id: syn-016
  category: synonym
  question: What strategy of refusing open battle and wearing the invader down by delay was used against Hannibal in Italy?
  ideal_answer: >-
    The cautious, delaying strategy of the dictator Quintus Fabius Maximus, who
    shadowed Hannibal from the heights, cut off his supplies and refused a pitched
    battle — earning the surname Cunctator ("the Delayer"/"Lingerer") and, at
    first, scorn at Rome, before it was recognised as the policy that saved the
    state.
  gold_spans:
    - pg_id: 10907
      groups: [fabius-delay]
      quote: >-
        Though he well knew that his procrastination was disapproved, not only
        in his own camp, but by this time even at Rome, yet, inflexibly adhering
        to the same line of policy, he delayed through the remainder of the summer
      note: Livy XXII — "procrastination"/"delay", not "attrition/delaying tactics"
    - pg_id: 19694
      groups: [fabius-delay]
      quote: >-
        From pursuing this policy he received the surname of _Cunctator_, or the
        _Lingerer_.
