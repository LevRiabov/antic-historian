- id: syn-018
  category: synonym
  question: What secret nocturnal religious society did the Roman senate outlaw as a criminal conspiracy?
  ideal_answer: >-
    The Bacchanalia — the secret night-rites of Bacchus. After they spread from
    Etruria through Italy and into Rome, the senate in 186 BC treated them as a
    dangerous conspiracy: thousands were tried and many executed, the meeting
    places demolished, and a decree forbade the rites in Rome or Italy except
    under strict, tiny, senate-licensed exceptions.
  gold_spans:
    - pg_id: 44318
      groups: [bacchanalia]
      quote: >-
        A charge was then given to demolish all the places where the
        Bacchanalians had held their meetings; first, in Rome, and then
        throughout all Italy
      note: Livy XXXIX — the suppression; text says "Bacchanalia"/"nocturnal rites"
    - pg_id: 10706
      groups: [bacchanalia]
      quote: >-
        a secret nocturnal festival in honour of the god Bacchus had been first
        introduced into Etruria through a Greek priest
      note: Mommsen, History of Rome — scholarship retelling
    - pg_id: 34122
      groups: [bacchanalia]
      quote: >-
        In 186 the decree for the suppression of the Bacchanalian scandal was
        passed.
      note: Dill, Roman Society — dates the suppression decree
  notes: >-
    Vocab gap — modern "cult/outlaw/conspiracy" vs Bacchanalia/nocturnal rites
    (though Livy's own narrative does use "conspiracy"). Fills the thin Livy
    37-end (#44318).
  status: reviewed

