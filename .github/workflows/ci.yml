name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          working-directory: backend
      - run: uv sync --locked
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run pyright
      - run: uv run pytest --cov=ahx
      # Dependency vulnerability audit of the LOCKED runtime deps (what the image ships):
      # a CVE in a transitive dep otherwise ships silently in a public FastAPI + Postgres
      # service. Audit the exported lock (not the ambient env) so it matches the deploy.
      - run: uv export --frozen --no-dev --no-emit-project --no-hashes --format requirements-txt -o requirements-audit.txt
      - run: uvx pip-audit -r requirements-audit.txt

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from package.json's `packageManager` field — the same
      # pin corepack uses in the Dockerfile, so CI and the image resolve identically.
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # Fail on a high/critical advisory in shipped (prod) deps. Scoped to --prod so a
      # dev-only toolchain advisory doesn't block a release; raise/lower --audit-level
      # to tune the gate.
      - run: pnpm audit --prod --audit-level high
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
