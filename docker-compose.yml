services:
  db:
    image: pgvector/pgvector:pg18
    container_name: ahx-db
    environment:
      POSTGRES_USER: ahx
      POSTGRES_PASSWORD: ahx
      POSTGRES_DB: ahx
    ports:
      - "5432:5432"
    volumes:
      - ahx-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ahx -d ahx"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ahx-pgdata:
