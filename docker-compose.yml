services:
  db:
    image: pgvector/pgvector:pg18
    container_name: ahx-db
    # Survive Docker Desktop / host restarts (outage observed 2026-06-12:
    # daemon restart left this container down, only one without a policy).
    restart: unless-stopped
    environment:
      POSTGRES_USER: ahx
      # Override in prod via a real secret (root .env / shell): POSTGRES_PASSWORD=...
      # The committed default is a LOCAL-DEV convenience, never a production credential.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ahx}
      POSTGRES_DB: ahx
    ports:
      # Bind to LOOPBACK only: the backend reaches the db at db:5432 over the compose
      # network, so the host publish is purely a local-dev convenience (psql from the
      # host). A bare "5433:5432" binds 0.0.0.0 and exposes Postgres on the box's public
      # interface — with these creds, a writable-DB integrity/availability risk. Host
      # 5433: rag-historian's ParadeDB already owns 5432 on the dev machine.
      - "127.0.0.1:5433:5432"
    volumes:
      - ahx-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ahx -d ahx"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: ahx-backend
    restart: unless-stopped
    # Secrets + provider config (embed/chat/judge keys) come from backend/.env.
    # The overrides below win over that file (compose precedence) and pin the
    # things that MUST differ inside the compose network.
    env_file:
      - backend/.env
    environment:
      AHX_ENV: prod
      # Reach the db service over the compose network (not localhost:5433). Password
      # tracks the db service's POSTGRES_PASSWORD (same default, same prod override).
      AHX_DATABASE_URL: postgresql+psycopg://ahx:${POSTGRES_PASSWORD:-ahx}@db:5432/ahx
      # Behind the nginx edge (frontend service): trust the proxy's X-Forwarded-For
      # so the per-IP limiter sees real client IPs, not one shared bucket. SAFE only
      # because nginx OVERWRITES that header (frontend/nginx.conf.template) — a client
      # cannot spoof it.
      AHX_TRUST_FORWARDED_FOR: "1"
    depends_on:
      db:
        condition: service_healthy
    # Not published to the host: only nginx is public. Reachable in-network as
    # backend:8000. Uncomment to debug the API directly.
    # ports:
    #   - "8000:8000"
    healthcheck:
      # /ready does a real SELECT 1 — so "healthy" means it can actually serve a
      # query, and the frontend below waits for that (not just the process being up).
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready').read()"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      # VITE_API_BASE is baked at build; /api matches the nginx proxy prefix.
      args:
        VITE_API_BASE: /api
    container_name: ahx-frontend
    restart: unless-stopped
    environment:
      # nginx proxies /api/ here (envsubst fills the template at startup).
      API_UPSTREAM: backend:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      # The only port exposed to the host: the SPA + its /api proxy on one origin.
      # Container side is 8080 — the unprivileged nginx image listens there (runs as
      # non-root, can't bind :80). See frontend/Dockerfile + nginx.conf.template.
      - "8080:8080"

volumes:
  ahx-pgdata:
